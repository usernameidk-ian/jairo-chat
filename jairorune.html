<!DOCTYPE html>
<html>
<head>
    <title>JAIRORUNE</title>
    <style>
        @font-face {
            font-family: 'Fixedsys';
            src: url('https://db.onlinewebfonts.com/t/c9aa129e79471168f237f37435f29910.woff2') format('woff2');
        }

        body, html {
            margin: 0; padding: 0;
            background-color: black;
            color: #00FF00;
            font-family: 'Fixedsys', 'Courier New', monospace;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* --- BACKGROUND --- */
        #abyss {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #222 0%, #000 70%);
            opacity: 0;
            z-index: -1;
            transition: opacity 3s;
        }

        /* --- STORY OVERLAY --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #red-beam {
            position: absolute;
            width: 4px;
            height: 100%;
            background: rgba(255, 0, 0, 0.6);
            box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.4);
            display: none;
        }

        #story-content {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        #center-soul {
            width: 20px; height: 20px;
            background: red;
            display: none;
            clip-path: polygon(50% 15%, 80% 0, 100% 30%, 50% 100%, 0 30%, 20% 0);
            animation: pulse 0.8s infinite alternate;
        }

        #text-box {
            font-size: 28px;
            color: white;
            letter-spacing: 5px;
            text-align: center;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            max-width: 80%;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* --- MENU --- */
        #menu-container { transition: opacity 1s; }
        .save-slot { border: 2px solid #004400; width: 600px; height: 100px; display: flex; align-items: center; padding: 0 20px; cursor: pointer; margin-bottom: 10px; position: relative; }
        .save-slot.active { border: 2px solid #00FF00; }
        .soul-cursor { width: 16px; height: 16px; background: red; position: absolute; left: -35px; display: none; clip-path: polygon(50% 15%, 80% 0, 100% 30%, 50% 100%, 0 30%, 20% 0); }
        .save-slot.active .soul-cursor { display: block; }
    </style>
</head>
<body>

    <div id="abyss"></div>

    <div id="menu-container">
        <div style="width: 600px; margin-bottom: 20px;">CHAPTER 1</div>
        <div class="save-slot active" onclick="startIntro()">
            <div class="soul-cursor"></div>
            <div style="display: flex; justify-content: space-between; width: 100%; font-size: 28px;">
                <div>[EMPTY]</div><div>--:--</div>
            </div>
        </div>
    </div>

    <div id="intro-overlay">
        <div id="red-beam"></div>
        <div id="story-content">
            <div id="center-soul"></div>
            <div id="text-box"></div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('menu-container');
        const overlay = document.getElementById('intro-overlay');
        const textBox = document.getElementById('text-box');
        const beam = document.getElementById('red-beam');
        const soul = document.getElementById('center-soul');
        const abyss = document.getElementById('abyss');

        let step = 0;
        let isWaiting = false;

        // The Full Script including your found dialogue
        const script = [
            { text: "ARE YOU THERE?", mode: "dark" },
            { text: "ARE WE CONNECTED?", mode: "dark" },
            { text: "EXCELLENT.", mode: "soul" },
            { text: "TRULY EXCELLENT.", mode: "soul" },
            { text: "NOW.", mode: "soul" },
            { text: "WE MAY BEGIN.", mode: "soul" },
            { text: "FIRST.", mode: "abyss" },
            { text: "YOU MUST CREATE A VESSEL.", mode: "abyss" },
            { text: "SELECT THE HEAD YOU PREFER.", mode: "creator" },
            // ... After selection (We'll skip selection for now for the demo)
            { text: "EXCELLENT.", mode: "abyss" },
            { text: "HOW INTERESTING.", mode: "abyss" },
            { text: "YOU ARE ABOUT TO MEET SOMEONE VERY, VERY WONDERFUL.", mode: "abyss" },
            { text: "OF COURSE. OF COURSE THEY ARE THE SAME.", mode: "abyss" },
            { text: "THANK YOU FOR YOUR TIME.", mode: "abyss" },
            { text: "YOUR ANSWERS.", mode: "abyss" },
            { text: "YOUR WONDERFUL CREATION...", mode: "abyss" },
            { text: "WILL NOW BE DISCARDED.", mode: "discard" },
            { text: "NO ONE CAN CHOOSE WHO THEY ARE IN THIS WORLD.", mode: "discard" }
        ];

        function startIntro() {
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                overlay.style.display = 'flex';
                setTimeout(() => { progress(); }, 3000);
            }, 1000);
        }

        function progress() {
            if (isWaiting || step >= script.length) return;

            const current = script[step];
            
            // Handle visual changes based on "mode"
            if (current.mode === "soul") {
                beam.style.display = 'block';
                soul.style.display = 'block';
            } else if (current.mode === "abyss") {
                beam.style.display = 'none';
                soul.style.display = 'none';
                abyss.style.opacity = '1';
            } else if (current.mode === "discard") {
                abyss.style.opacity = '0'; // Everything fades to black
            }

            fadeText(current.text);
            step++;
        }

        function fadeText(txt) {
            isWaiting = true;
            textBox.style.opacity = '0';
            setTimeout(() => {
                textBox.innerText = txt;
                textBox.style.opacity = '1';
                setTimeout(() => { isWaiting = false; }, 1500);
            }, 1000);
        }

        window.addEventListener('keydown', (e) => { if (e.key === "Enter") progress(); });
        overlay.addEventListener('click', progress);
    </script>
</body>
</html>
