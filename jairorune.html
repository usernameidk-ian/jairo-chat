<!DOCTYPE html>
<html>
<head>
    <title>CONTACT</title>
    <style>
        @font-face {
            font-family: 'Fixedsys';
            src: url('https://db.onlinewebfonts.com/t/c9aa129e79471168f237f37435f29910.woff2') format('woff2');
        }

        body, html {
            margin: 0; padding: 0;
            background: black;
            color: white;
            font-family: 'Fixedsys', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Goner Abyss Background Logic */
        #abyss-layer {
            position: fixed; inset: 0;
            background-image: url('bg_abyss.png'); /* Add your sprite here later */
            background-color: #1a1a1a; /* Backup color from source */
            opacity: 0;
            z-index: 1;
            transition: opacity 4s;
            /* The source code scrolls the background at a 45-degree angle */
            animation: abyssScroll 30s linear infinite;
        }

        @keyframes abyssScroll {
            from { background-position: 0 0; }
            to { background-position: 500px 500px; }
        }

        /* The Red Beam */
        #red-beam {
            position: absolute;
            width: 2px; height: 100%;
            background: #FF0000;
            box-shadow: 0 0 12px #FF0000;
            opacity: 0;
            z-index: 2;
            left: 50%; transform: translateX(-50%);
            transition: opacity 2s;
        }

        #story-ui {
            position: relative;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 25px;
            z-index: 10;
        }

        #soul {
            width: 18px; height: 18px;
            background: red;
            clip-path: polygon(50% 15%, 80% 0, 100% 30%, 50% 100%, 0 30%, 20% 0);
            display: none;
            animation: soulPulse 0.8s infinite alternate;
        }

        #text-typer {
            font-size: 32px;
            letter-spacing: 5px;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        @keyframes soulPulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Menu Styling */
        #menu { width: 600px; color: #00FF00; z-index: 20; }
        .save-slot { border: 2px solid #004400; padding: 30px; margin-bottom: 10px; cursor: pointer; }
        .save-slot.active { border-color: #00FF00; }
    </style>
</head>
<body onclick="handleInput()" onkeydown="if(event.key==='Enter') handleInput()">

    <div id="abyss-layer"></div>
    <div id="red-beam"></div>

    <div id="menu">
        <div style="margin-bottom: 20px;">CHAPTER 1</div>
        <div class="save-slot active" id="slot1">[EMPTY]</div>
        <div class="save-slot">[EMPTY]</div>
    </div>

    <div id="story-ui">
        <div id="soul"></div>
        <div id="text-typer"></div>
    </div>

    <script>
        const textElement = document.getElementById('text-typer');
        const soul = document.getElementById('soul');
        const beam = document.getElementById('red-beam');
        const abyss = document.getElementById('abyss-layer');
        const menu = document.getElementById('menu');
        const storyUI = document.getElementById('story-ui');

        // This matches the "con" (controller) states in the decompiled code
        let con = 0; 
        let isTyping = false;

        const scriptData = [
            { text: "ARE YOU THERE?", type: "dark" },
            { text: "ARE WE CONNECTED?", type: "dark" },
            { text: "EXCELLENT.", type: "soul" },
            { text: "TRULY EXCELLENT.", type: "soul" },
            { text: "HOW INTERESTING.", type: "soul" },
            { text: "YOU ARE ABOUT TO\nMEET SOMEONE\nVERY, VERY\nWONDERFUL.", type: "soul" },
            { text: "NOW.", type: "soul" },
            { text: "WE MAY BEGIN.", type: "soul" },
            { text: "FIRST.", type: "abyss" },
            { text: "YOU MUST CREATE A VESSEL.", type: "abyss" }
        ];

        function handleInput() {
            if (isTyping) return;
            
            if (con === 0) {
                // Start sequence: Fade out menu
                menu.style.display = 'none';
                storyUI.style.display = 'flex';
                document.title = "CONTACT"; // Matches source code behavior
                setTimeout(nextStep, 2000);
                con = 1;
                return;
            }
            nextStep();
        }

        function nextStep() {
            const index = con - 1;
            if (index >= scriptData.length) return;

            const current = scriptData[index];

            // Visual Logic based on decompiled "States"
            if (current.type === "soul") {
                beam.style.opacity = "1";
                soul.style.display = "block";
            } else if (current.type === "abyss") {
                beam.style.opacity = "0";
                soul.style.display = "none";
                abyss.style.opacity = "1";
            }

            typeWriter(current.text);
            con++;
        }

        function typeWriter(txt) {
            isTyping = true;
            textElement.innerHTML = "";
            let i = 0;
            
            // 70ms is the 'snd_txtgas' delay found in the data files
            const timer = setInterval(() => {
                if (txt[i] === "\n") {
                    textElement.innerHTML += "<br>";
                } else {
                    textElement.innerHTML += txt[i];
                }
                
                i++;
                if (i >= txt.length) {
                    clearInterval(timer);
                    isTyping = false;
                }
            }, 70);
        }
    </script>
</body>
</html>
