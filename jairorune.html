<!DOCTYPE html>
<html>
<head>
    <title>JAIRORUNE</title>
    <style>
        @font-face {
            font-family: 'Fixedsys';
            src: url('https://db.onlinewebfonts.com/t/c9aa129e79471168f237f37435f29910.woff2') format('woff2');
        }

        body, html {
            margin: 0; padding: 0;
            background-color: black;
            color: #00FF00; /* Neon Green from your screenshot */
            font-family: 'Fixedsys', 'Courier New', monospace;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* --- SAVE MENU LAYOUT --- */
        #chapter-header {
            width: 600px;
            text-align: left;
            font-size: 24px;
            margin-bottom: 40px;
        }

        #save-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .save-slot {
            border: 2px solid #005500; /* Darker green border */
            width: 600px;
            height: 100px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: relative;
            cursor: pointer;
        }

        .save-slot.active {
            border-color: #00FF00;
        }

        /* The little red soul cursor */
        .soul-cursor {
            width: 15px;
            height: 15px;
            background: red;
            position: absolute;
            left: -30px;
            display: none;
            clip-path: polygon(50% 15%, 80% 0, 100% 30%, 50% 100%, 0 30%, 20% 0);
        }

        .save-slot.active .soul-cursor {
            display: block;
        }

        .slot-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 28px;
        }

        /* Bottom Options */
        #menu-footer {
            margin-top: 30px;
            width: 620px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
        }

        /* --- THE STORY OVERLAY --- */
        #story-overlay {
            position: fixed;
            inset: 0;
            background: black;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #text-box {
            font-size: 30px;
            color: white;
            text-align: center;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 1s;
        }

        /* Red Beam for the Soul Reveal */
        #red-beam {
            position: absolute;
            width: 80px;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,0,0,0.4), transparent);
            display: none;
        }

        #center-soul {
            width: 30px;
            height: 30px;
            background: red;
            display: none;
            clip-path: polygon(50% 15%, 80% 0, 100% 30%, 50% 100%, 0 30%, 20% 0);
            z-index: 11;
        }
    </style>
</head>
<body>

    <div id="chapter-header">CHAPTER 1</div>

    <div id="save-container">
        <div class="save-slot active" onclick="selectSlot(this)">
            <div class="soul-cursor"></div>
            <div class="slot-info">
                <span>[EMPTY]</span>
                <span>--:--</span>
            </div>
        </div>
        <div class="save-slot" onclick="selectSlot(this)">
            <div class="soul-cursor"></div>
            <div class="slot-info">
                <span>[EMPTY]</span>
                <span>--:--</span>
            </div>
        </div>
        <div class="save-slot" onclick="selectSlot(this)">
            <div class="soul-cursor"></div>
            <div class="slot-info">
                <span>[EMPTY]</span>
                <span>--:--</span>
            </div>
        </div>
    </div>

    <div id="menu-footer">
        <div>COPY</div>
        <div>ERASE</div>
        <div>END PROGRAM</div>
    </div>

    <div id="story-overlay">
        <div id="red-beam"></div>
        <div id="center-soul"></div>
        <div id="text-box"></div>
    </div>

    <script>
        let step = 0;
        const overlay = document.getElementById('story-overlay');
        const textBox = document.getElementById('text-box');
        const beam = document.getElementById('red-beam');
        const centerSoul = document.getElementById('center-soul');

        function selectSlot(el) {
            // Remove active from others
            document.querySelectorAll('.save-slot').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            
            // In the real game, clicking twice or pressing Enter starts it
            // For this version, let's start the intro on click
            startSequence();
        }

        function startSequence() {
            overlay.style.display = 'flex';
            progress();
        }

        function progress() {
            if (step === 0) fadeText("ARE YOU THERE?");
            if (step === 1) fadeText("ARE WE CONNECTED?");
            if (step === 2) {
                textBox.style.opacity = 0;
                setTimeout(() => {
                    beam.style.display = 'block';
                    centerSoul.style.display = 'block';
                    fadeText("EXCELLENT.");
                }, 1000);
            }
            if (step === 3) fadeText("TRULY EXCELLENT.");
            if (step === 4) fadeText("NOW.");
            if (step === 5) {
                fadeText("WE MAY BEGIN.");
                // We would hide the beam here and move to Vessel Creation
            }
            step++;
        }

        function fadeText(txt) {
            textBox.style.opacity = 0;
            setTimeout(() => {
                textBox.innerText = txt;
                textBox.style.opacity = 1;
            }, 1000);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "Enter" && overlay.style.display === 'flex') progress();
        });
    </script>
</body>
</html>
