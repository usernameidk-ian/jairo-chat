<!DOCTYPE html>
<html>
<head>
    <title>JAIRORUNE</title>
    <style>
        @font-face {
            font-family: 'Fixedsys';
            src: url('https://db.onlinewebfonts.com/t/c9aa129e79471168f237f37435f29910.woff2') format('woff2');
        }

        body, html {
            margin: 0; padding: 0;
            background-color: black;
            color: #00FF00;
            font-family: 'Fixedsys', 'Courier New', monospace;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* --- SAVE MENU --- */
        #menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 1s;
        }

        #chapter-header {
            width: 600px;
            text-align: left;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .save-slot {
            border: 2px solid #004400;
            width: 600px;
            height: 100px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: relative;
            cursor: pointer;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .save-slot.active { border: 2px solid #00FF00; }

        .soul-cursor {
            width: 16px; height: 16px;
            background: red;
            position: absolute;
            left: -35px;
            display: none;
            clip-path: polygon(50% 15%, 80% 0, 100% 30%, 50% 100%, 0 30%, 20% 0);
        }

        .save-slot.active .soul-cursor { display: block; }

        .slot-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 28px;
        }

        #menu-footer {
            margin-top: 30px;
            width: 600px;
            display: flex;
            justify-content: space-between;
            font-size: 22px;
        }

        /* --- THE INTRO SEQUENCE --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: black;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* The Red Beam from your screenshot */
        #red-beam {
            position: absolute;
            width: 4px; /* Thin beam like the screenshot */
            height: 100%;
            background: rgba(255, 0, 0, 0.6);
            box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.4);
            display: none;
        }

        /* This container keeps the heart and text together */
        #story-content {
            display: flex;
            align-items: center;
            gap: 20px; /* Space between heart and text */
            z-index: 10;
        }

        #center-soul {
            width: 20px;
            height: 20px;
            background: red;
            display: none; /* Initially hidden */
            clip-path: polygon(50% 15%, 80% 0, 100% 30%, 50% 100%, 0 30%, 20% 0);
            animation: pulse 0.8s infinite alternate;
        }

        #text-box {
            font-size: 30px;
            color: white;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <div id="chapter-header">CHAPTER 1</div>
        <div class="save-slot active" onclick="handleSlotClick(this)">
            <div class="soul-cursor"></div>
            <div class="slot-info"><div>[EMPTY]</div><div>--:--</div></div>
        </div>
        <div class="save-slot" onclick="handleSlotClick(this)">
            <div class="soul-cursor"></div>
            <div class="slot-info"><div>[EMPTY]</div><div>--:--</div></div>
        </div>
        <div class="save-slot" onclick="handleSlotClick(this)">
            <div class="soul-cursor"></div>
            <div class="slot-info"><div>[EMPTY]</div><div>--:--</div></div>
        </div>
        <div id="menu-footer">
            <div>COPY</div><div>ERASE</div><div>END PROGRAM</div>
        </div>
    </div>

    <div id="intro-overlay">
        <div id="red-beam"></div>
        <div id="story-content">
            <div id="center-soul"></div>
            <div id="text-box"></div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('menu-container');
        const overlay = document.getElementById('intro-overlay');
        const textBox = document.getElementById('text-box');
        const beam = document.getElementById('red-beam');
        const soul = document.getElementById('center-soul');

        let step = 0;
        let isWaiting = false;

        function handleSlotClick(el) {
            if (!el.classList.contains('active')) {
                document.querySelectorAll('.save-slot').forEach(s => s.classList.remove('active'));
                el.classList.add('active');
                return;
            }
            startIntro();
        }

        function startIntro() {
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                overlay.style.display = 'flex';
                // 3 Seconds of pure darkness
                setTimeout(() => { progress(); }, 3000);
            }, 1000);
        }

        function progress() {
            if (isWaiting) return;

            if (step === 0) fadeText("ARE YOU THERE?");
            if (step === 1) fadeText("ARE WE CONNECTED?");
            
            if (step === 2) {
                // Fade out text, then show beam + heart + EXCELLENT
                textBox.style.opacity = '0';
                setTimeout(() => {
                    beam.style.display = 'block';
                    soul.style.display = 'block';
                    setTimeout(() => { fadeText("EXCELLENT."); }, 1000);
                }, 1000);
            }

            if (step === 3) fadeText("TRULY EXCELLENT.");
            if (step === 4) fadeText("NOW.");
            if (step === 5) fadeText("WE MAY BEGIN.");

            step++;
        }

        function fadeText(txt) {
            isWaiting = true;
            textBox.style.opacity = '0';
            setTimeout(() => {
                textBox.innerText = txt;
                textBox.style.opacity = '1';
                setTimeout(() => { isWaiting = false; }, 1500);
            }, 1000);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "Enter") {
                if (overlay.style.display === 'flex') progress();
                else startIntro();
            }
        });

        overlay.addEventListener('click', progress);
    </script>
</body>
</html>
