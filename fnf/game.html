<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>jairos turf — rhythm</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div id="mobile-warning" class="overlay" style="display:none;">
    <div class="panel">
      <h2>Not supported on mobile</h2>
      <p>This game is desktop-only.</p>
      <button id="continue-anyway">Continue anyway</button>
    </div>
  </div>

  <header id="topbar">
    <div class="title">jairos turf</div>
    <div class="controls">
      <button id="fsBtn">Full Screen</button>
      <button id="backBtn">Close</button>
    </div>
  </header>

  <main id="main">
    <canvas id="gameCanvas" width="960" height="640"></canvas>
    <aside id="hud">
      <div class="score">Score: <span id="score">0</span></div>
      <div class="healthbar"><div id="healthFill"></div></div>
      <div class="judgment" id="judge"></div>
      <div class="keys">
        <div class="key">D</div><div class="key">F</div><div class="key">J</div><div class="key">K</div>
      </div>
    </aside>
  </main>

  <audio id="song" preload="auto">
    <source src="song_120bpm.mp3" type="audio/mpeg" />
  </audio>

  <script src="game.js"></script>
</body>
</html>
