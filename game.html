<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jairo Spin — Demo</title>
<style>
  :root{
    --bg1:#062; --bg2:#600;
    --panel-bg: rgba(0,0,0,.75);
    --accent: #00ff66;
    --glass: rgba(255,255,255,0.03);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial; background:linear-gradient(135deg,var(--bg1),var(--bg2)); color:#fff;}
  .app {
    max-width:960px; margin:28px auto; padding:24px; position:relative;
  }

  header {display:flex;align-items:center;justify-content:space-between; gap:12px;}
  h1{margin:0;font-size:20px;letter-spacing:0.6px}
  .controls {display:flex; gap:8px; align-items:center}
  .btn {
    background: linear-gradient(180deg,#111,#000);
    border:1px solid rgba(255,255,255,0.06);
    color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45), inset 0 -6px 18px rgba(255,255,255,0.02);
  }
  .btn.primary { background: linear-gradient(180deg,#00d27a,#00783f); color:#001; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
  .btn:active{transform:translateY(1px)}

  /* main panel */
  .panel {
    margin-top:18px; background:var(--panel-bg); border-radius:14px; padding:18px; display:flex; gap:18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }

  .left {
    flex:1; min-width:360px;
  }
  .center {
    width:420px; display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .right {
    width:260px;
  }

  /* Spin button / card */
  .spin-card {
    width:100%; background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border-radius:12px; padding:14px; display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .big-spin {
    width:200px; height:200px; border-radius:14px; display:grid; place-items:center;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border:1px solid rgba(255,255,255,0.06);
    position:relative; overflow:hidden;
  }
  .spin-button {
    position:absolute; z-index:3; bottom:16px; left:50%; transform:translateX(-50%);
    width:120px; text-align:center; border-radius:999px; padding:12px 18px; font-weight:900; letter-spacing:1px; cursor:pointer;
  }
  .spin-button.primary { background:linear-gradient(180deg,#ffd85c,#ff9f1c); color:#000; box-shadow: 0 8px 24px rgba(255,160,0,0.28); border:none; }
  .spin-info { font-size:13px; color: #bfbfbf; text-align:center; max-width:320px }

  /* inventory right */
  .inv { background:var(--glass); border-radius:10px; padding:10px; height:420px; overflow:auto; }
  .inv h3{margin:0 0 8px 0;font-size:14px}
  .inv-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .card-mini { background:rgba(0,0,0,0.45); padding:6px; border-radius:8px; display:flex; gap:8px; align-items:center }
  .card-mini img{width:44px;height:44px;border-radius:6px;object-fit:cover}
  .card-mini .meta { font-size:12px }
  .rarity-common{border:1px solid rgba(255,255,255,0.02)}
  .rarity-rare{box-shadow:0 0 8px rgba(0,120,255,0.08)}
  .rarity-legendary{box-shadow:0 0 12px rgba(255,200,40,0.12)}

  /* overlay spinner UI */
  .overlay {
    position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:999;
    background: rgba(0,0,0,0.65);
  }
  .spinner-window {
    width: min(92%,1100px); max-width:1100px; height:220px; background:rgba(10,10,10,0.8); border-radius:12px; overflow:hidden;
    display:flex; align-items:center; justify-content:center; position:relative; padding:12px;
    border:1px solid rgba(255,255,255,0.04);
  }
  .spinner-track {
    height:160px; width:100%; overflow:hidden; position:relative;
    display:flex; align-items:center;
  }
  .spinner-inner {
    display:flex; gap:12px; align-items:center; transform:translateX(0px);
    transition: transform 1s cubic-bezier(.2,.9,.2,1);
    will-change: transform;
  }
  .spin-item {
    width:140px; height:140px; border-radius:12px; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden;
    flex-shrink:0; position:relative; border:1px solid rgba(255,255,255,0.03);
  }
  .spin-item img{
    width:100%; height:100%; object-fit:cover; display:block;
  }

  /* silhouette: black + outline effect */
  .silhouette img{
    filter: grayscale(100%) brightness(0) contrast(2000%);
    mix-blend-mode: normal;
    /* white outline */
    -webkit-filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.85)) drop-shadow(0px 0px 8px rgba(255,255,255,0.6));
    filter: brightness(0) contrast(2000%) drop-shadow(0 0 4px rgba(255,255,255,0.85)) drop-shadow(0 0 8px rgba(255,255,255,0.6));
  }
  .revealed img {
    filter: none;
    transition: transform .5s ease, filter .5s ease;
  }

  /* reveal animation */
  .reveal-glow {
    position:absolute; inset:0; border-radius:12px; pointer-events:none;
    box-shadow: 0 0 0px rgba(255,255,255,0.0);
    transition: box-shadow .6s ease;
  }
  .reveal-glow.show {
    box-shadow: 0 0 32px rgba(255,220,120,0.9), inset 0 0 40px rgba(255,220,120,0.12);
  }

  .center-hint { color:#ddd; font-size:13px; text-align:center; }

  /* final reveal modal */
  .reveal-modal {
    position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:1000;
  }
  .reveal-card {
    width: min(92%,520px); background:linear-gradient(180deg,#111,#000); padding:18px; border-radius:14px; text-align:center;
    border:1px solid rgba(255,255,255,0.06);
  }
  .reveal-card img { width:220px; height:220px; object-fit:cover; border-radius:10px; display:block; margin:0 auto; }
  .reveal-card .name { margin-top:12px; font-weight:800; font-size:20px; color:var(--accent); }
  .small { font-size:13px; color:#bbb }

  @media (max-width:820px){
    .panel { flex-direction:column; }
    .center { width:100% }
    .right{width:100%}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Jairo Spin — Demo</h1>
    <div class="controls">
      <button class="btn" id="resetBtn">Reset Inventory</button>
      <button class="btn" id="seedBtn">Seed Example Jairos</button>
    </div>
  </header>

  <div class="panel">
    <div class="left">
      <div class="spin-card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <strong>Fancy Spin</strong>
            <div class="spin-info">Press SPIN and watch outlines slide by. Newly obtained Jairos are revealed.</div>
          </div>
          <div style="text-align:right;">
            <div class="small">Spins: <span id="spinCount">0</span></div>
            <div class="small">Overload meter: <span id="overloadMeter">0</span>/50</div>
          </div>
        </div>

        <div class="big-spin" id="bigSpin">
          <!-- visual center placeholder (you can style) -->
          <div class="center-hint">Jairos will parade across the screen</div>
          <button class="spin-button primary" id="spinBtn">SPIN</button>
        </div>
      </div>

      <div style="margin-top:12px">
        <div class="small">Inventory preview:</div>
        <div id="invPreview" style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>
    </div>

    <div class="center">
      <!-- spinner overlay will appear on spin -->
      <div style="opacity:0.85; color:#ddd; font-size:13px; text-align:center;">Press spin to start the reveal sequence</div>
      <div style="height:12px"></div>
      <div style="color:#aaa; font-size:13px">Result</div>
      <div id="lastResult" style="width:240px;height:240px;border-radius:12px;background:rgba(255,255,255,0.02);display:grid;place-items:center">
        <img id="lastImg" src="" alt="" style="width:180px;height:180px;border-radius:10px;object-fit:cover;display:none" />
        <div id="lastName" style="display:block;color:#ddd">—</div>
      </div>
    </div>

    <div class="right">
      <div class="inv">
        <h3>Your JairoDex</h3>
        <div id="inventoryList" class="inv-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- overlay spinner -->
<div class="overlay" id="overlay">
  <div class="spinner-window">
    <div class="spinner-track">
      <div class="spinner-inner" id="spinnerInner"></div>
    </div>
    <!-- center marker -->
    <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:160px; height:160px; border-radius:12px; pointer-events:none; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.04)"></div>
  </div>
</div>

<!-- reveal modal -->
<div class="reveal-modal" id="revealModal">
  <div class="reveal-card" id="revealCard">
    <img id="revealImg" src="" alt="" />
    <div class="name" id="revealName">NAME</div>
    <div class="small" id="revealRarity">RARITY</div>
    <div style="height:12px"></div>
    <button class="btn primary" id="claimBtn">Nice!</button>
  </div>
</div>

<script>
/*
  Single-file Jairo Spin demo.
  - localStorage used for inventory (key: 'jairo_demo_inv')
  - Jairos are seeded with `seedExampleJairos()` (call the seed button)
  - Replace placeholder images by setting each jairo.image to a real URL.
*/

// ----------------------------
// Data & config
// ----------------------------
const JAIROS_KEY = 'jairo_demo_inv';
let jairos = []; // will hold objects {id,name,rarity,image}
let inventory = {}; // id -> count
let spinStats = { spins:0, spinsSinceLastOverload:0 };

// rarity weights (sum ~1)
const WEIGHTS = {
  mythic: 0.001,
  legendary: 0.01,
  ultrarare: 0.04,
  rare: 0.10,
  uncommon: 0.25,
  common: 0.599
};

// small helper to normalize weights (if you edit)
function normalizedWeights(w){
  const sum = Object.values(w).reduce((a,b)=>a+b,0) || 1;
  const out = {};
  for(const k in w) out[k] = w[k]/sum;
  return out;
}
const N_WEIGHTS = normalizedWeights(WEIGHTS);

// ----------------------------
// Placeholder image generator
// produces SVG dataURL with text so UI works without real images
// ----------------------------
function makePlaceholder(name, color="#666", size=512){
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${size}' height='${size}'>
    <rect width='100%' height='100%' rx='20' fill='${color}'/>
    <g font-family='Arial' font-weight='700' fill='white' text-anchor='middle'>
      <text x='50%' y='48%' font-size='42'>${escapeHtml(name)}</text>
      <text x='50%' y='70%' font-size='20' fill='rgba(255,255,255,0.85)'>Jairo</text>
    </g>
  </svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ----------------------------
// Helpers: pick rarity & jairo
// ----------------------------
function pickRarity(weights){
  const r = Math.random();
  let cum = 0;
  for(const k of Object.keys(weights)){
    cum += weights[k];
    if(r < cum) return k;
  }
  // fallback
  return Object.keys(weights)[Object.keys(weights).length-1];
}
function pickJairo(){
  // pick rarity
  const rarity = pickRarity(N_WEIGHTS);
  const pool = jairos.filter(j=> j.rarity === rarity);
  if(pool.length === 0) {
    // fallback: pick any
    return jairos[Math.floor(Math.random() * jairos.length)];
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

// ----------------------------
// Storage & inventory
// ----------------------------
function loadInventory(){
  try{
    const raw = localStorage.getItem(JAIROS_KEY);
    inventory = raw ? JSON.parse(raw) : {};
  }catch(e){ inventory = {}; }
}
function saveInventory(){
  localStorage.setItem(JAIROS_KEY, JSON.stringify(inventory));
}
function giveJairo(id){
  inventory[id] = (inventory[id]||0) + 1;
  saveInventory();
  renderInventory();
}

// ----------------------------
// UI wiring
// ----------------------------
const spinBtn = document.getElementById('spinBtn');
const overlay = document.getElementById('overlay');
const spinnerInner = document.getElementById('spinnerInner');
const revealModal = document.getElementById('revealModal');
const revealImg = document.getElementById('revealImg');
const revealName = document.getElementById('revealName');
const revealRarity = document.getElementById('revealRarity');
const claimBtn = document.getElementById('claimBtn');
const invPreview = document.getElementById('invPreview');
const inventoryList = document.getElementById('inventoryList');
const spinCountEl = document.getElementById('spinCount');
const overloadMeterEl = document.getElementById('overloadMeter');
const lastImg = document.getElementById('lastImg');
const lastName = document.getElementById('lastName');

spinBtn.addEventListener('click', startSpin);
claimBtn.addEventListener('click', ()=> { revealModal.style.display='none'; });

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('Reset inventory and stats?')) return;
  localStorage.removeItem(JAIROS_KEY);
  inventory = {}; saveInventory(); renderInventory();
  spinStats = {spins:0,spinsSinceLastOverload:0}; updateStatsUI();
});
document.getElementById('seedBtn').addEventListener('click', ()=>{
  seedExampleJairos(); renderInventory(); renderInvPreview();
});

// render inventory previews (tiny)
function renderInvPreview(){
  invPreview.innerHTML='';
  const owned = Object.keys(inventory);
  if(owned.length===0){ invPreview.textContent = 'You have none yet.'; return; }
  owned.forEach(id=>{
    const j = jairos.find(x=>x.id===id);
    if(!j) return;
    const el = document.createElement('div');
    el.style.width='72px'; el.style.height='72px'; el.style.borderRadius='8px'; el.style.overflow='hidden';
    el.style.background='rgba(255,255,255,0.03)'; el.style.display='grid'; el.style.placeItems='center';
    const img = document.createElement('img'); img.src=j.image; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover';
    el.appendChild(img); invPreview.appendChild(el);
  });
}

// inventory list detailed
function renderInventory(){
  inventoryList.innerHTML='';
  const ids = Object.keys(inventory);
  // sort by rarity
  ids.sort((a,b)=>{
    const ra = rarityRank(jairos.find(x=>x.id===a)?.rarity);
    const rb = rarityRank(jairos.find(x=>x.id===b)?.rarity);
    return ra - rb;
  });
  if(ids.length===0){
    inventoryList.innerHTML = '<div style="color:#aaa">No jairos yet. Spin to get some!</div>';
    lastImg.style.display='none'; lastName.textContent='—';
    return;
  }
  ids.forEach(id=>{
    const j = jairos.find(x=>x.id===id);
    if(!j) return;
    const node = document.createElement('div'); node.className='card-mini rarity-'+j.rarity;
    const img = document.createElement('img'); img.src=j.image;
    const meta = document.createElement('div'); meta.className='meta';
    meta.innerHTML = `<div style="font-weight:700">${j.name}</div><div style="color:#ccc">${j.rarity} • ${inventory[id]}x</div>`;
    node.appendChild(img); node.appendChild(meta);
    inventoryList.appendChild(node);
  });
  // update last result preview
  const lastId = ids[ids.length-1];
  const lj = jairos.find(x=>x.id===lastId);
  if(lj){ lastImg.src = lj.image; lastImg.style.display='block'; lastName.textContent = `${lj.name} (${inventory[lastId]}x)`; }
}

// nice ordering
function rarityRank(r){ const order=['mythic','legendary','ultrarare','rare','uncommon','common']; return order.indexOf(r||'common'); }

// ----------------------------
// Spinner build & animation
// ----------------------------
let spinning = false;
function startSpin(){
  if(spinning) return;
  if(jairos.length === 0){ alert('No jairos defined yet. Click "Seed Example Jairos" to populate demos.'); return; }
  spinning = true;

  // overload logic: when >=50 spins since last, 25% chance to trigger overload (as user requested)
  let overload = false;
  if(spinStats.spinsSinceLastOverload >= 50){
    if(Math.random() < 0.25){
      overload = true;
      spinStats.spinsSinceLastOverload = 0;
    } else {
      spinStats.spinsSinceLastOverload++;
    }
  } else {
    spinStats.spinsSinceLastOverload++;
  }

  spinStats.spins++;
  updateStatsUI();

  // pick final result (apply overload boost if true)
  const final = overload ? pickWithBoost() : pickJairo();

  // Prepare items for the carousel: include owned ones (revealed) plus silhouettes for not-yet-owned
  const pool = buildSpinnerPool(final);
  populateSpinner(pool);

  // show overlay & animate scroll
  overlay.style.display = 'flex';

  // start with items arranged so we can animate a long translate
  // compute index of chosen item in the repeated array (we set it near the middle repeat for safety)
  const items = Array.from(spinnerInner.children);
  let chosenIndex = -1;
  for(let i=0;i<items.length;i++){
    if(items[i].dataset.jairoId === final.id){
      chosenIndex = i; break;
    }
  }
  if(chosenIndex === -1) chosenIndex = Math.floor(items.length/2);

  // animate: first a continuous fast scroll (by changing transform via requestAnimationFrame)
  // then slow down and snap so chosen item is centered.

  const track = spinnerInner;
  // item width + gap calc
  const item = track.querySelector('.spin-item');
  const itemStyle = getComputedStyle(item);
  const gap = 12;
  const itemW = item.offsetWidth + gap;

  // We will loop by translating negative X. We want chosen item to land at center of spinner-window.
  const container = document.querySelector('.spinner-window');
  const centerX = container.offsetWidth/2;
  // left offset of chosen item relative to track start = chosenIndex * itemW + itemW/2
  const baseOffset = chosenIndex * itemW + (itemW/2);
  // target translate so chosen center aligns with centerX:
  const targetTranslate = centerX - baseOffset;

  // start fast auto-scrolling by setting CSS transition short repeated moves
  // We'll animate using JS for controlled easing:
  let animStart = performance.now();
  const totalDuration = 2800 + Math.random()*900; // total spin time
  const startTranslate = 0; // track starts at 0
  const extraCycles = 2 + Math.floor(Math.random()*3); // how many cycles before slowing
  const totalDistance = -(items.length * itemW * extraCycles) + targetTranslate; // negative value

  // easing function (easeOutCubic)
  function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }

  function frame(now){
    const t = Math.min(1, (now - animStart) / totalDuration);
    // apply easing and progress
    const eased = easeOutCubic(t);
    const current = startTranslate + (totalDistance * eased);
    track.style.transform = `translateX(${current}px)`;
    if(t < 1){
      requestAnimationFrame(frame);
    } else {
      // stop - show reveal
      setTimeout(()=> {
        revealFinal(final);
        overlay.style.display = 'none';
        spinning = false;
      }, 400);
    }
  }
  requestAnimationFrame(frame);
}

// build spinner pool (mix owned and silhouettes). Ensure final is included multiple times.
function buildSpinnerPool(final){
  // include a bunch of items so the spinner looks varied.
  // Strategy: take all jairos, but for ones not owned, will show silhouette class.
  // repeat list to have sufficient length and insert the final multiple times to increase chance it appears centrally.
  // Create base array
  const base = jairos.slice();
  // Shuffle
  shuffleArray(base);
  // Build pool by repeating
  const pool = [];
  const repeats = 6;
  for(let r=0;r<repeats;r++){
    base.forEach(j=> pool.push(j));
  }
  // Insert final a few extra times at random spots near middle to ensure it's present
  const mid = Math.floor(pool.length/2);
  pool.splice(mid,0, final);
  pool.splice(mid+3,0, final);
  pool.splice(mid+7,0, final);

  return pool;
}

// fill spinnerInner element
function populateSpinner(pool){
  spinnerInner.innerHTML = '';
  pool.forEach(j=>{
    const div = document.createElement('div'); div.className = 'spin-item';
    // if user owns -> revealed class; else silhouette
    const owned = Boolean(inventory[j.id]);
    if(owned) div.classList.add('revealed'); else div.classList.add('silhouette');
    div.dataset.jairoId = j.id;
    const img = document.createElement('img'); img.src = j.image; img.alt = j.name;
    div.appendChild(img);
    // reveal glow overlay
    const glow = document.createElement('div'); glow.className='reveal-glow';
    div.appendChild(glow);
    spinnerInner.appendChild(div);
  });
  // ensure track starts at 0 transform
  spinnerInner.style.transition = 'none';
  spinnerInner.style.transform = `translateX(0px)`;
  // small timeout to allow layout before animations start
  setTimeout(()=> spinnerInner.style.transition = '', 30);
}

// reveal final result visually and add to inventory (with different effect if new)
function revealFinal(final){
  const isNew = !inventory[final.id];
  if(isNew){
    giveJairo(final.id);
  } else {
    // still increment (we want dupes tracked)
    giveJairo(final.id);
  }
  // show reveal modal with animation
  revealImg.src = final.image;
  revealName.textContent = final.name;
  revealRarity.textContent = final.rarity.toUpperCase();
  revealModal.style.display = 'flex';
  // small pop animation
  const img = revealImg;
  img.style.transform = 'scale(.6)';
  img.style.opacity = '0';
  setTimeout(()=>{ img.style.transition='transform .45s cubic-bezier(.2,.9,.2,1), opacity .35s'; img.style.transform='scale(1)'; img.style.opacity='1'; }, 40);
  renderInventory(); renderInvPreview();
}

// ----------------------------
// Utility: weighted pick with overload boost (increases rares chances)
// ----------------------------
function pickWithBoost(){
  // create boosted weights: raise chance for rare+ tiers
  const boosted = Object.assign({}, N_WEIGHTS);
  boosted.rare = (boosted.rare || 0) + 0.08;
  boosted.ultrarare = (boosted.ultrarare || 0) + 0.03;
  boosted.legendary = (boosted.legendary || 0) + 0.01;
  // renormalize
  return pickByWeights(renormalize(boosted));
}
function pickByWeights(weights){
  const r = Math.random();
  let cum=0;
  for(const k of Object.keys(weights)){
    cum += weights[k];
    if(r < cum) {
      const pool = jairos.filter(j=> j.rarity === k);
      if(pool.length) return pool[Math.floor(Math.random()*pool.length)];
      break;
    }
  }
  // fallback
  return jairos[Math.floor(Math.random()*jairos.length)];
}
function renormalize(obj){
  const sum = Object.values(obj).reduce((a,b)=>a+b,0) || 1;
  const out = {};
  for(const k in obj) out[k] = obj[k]/sum;
  return out;
}

// ----------------------------
// Demo seeding (creates many jairos so you can test)
// ----------------------------
function seedExampleJairos(){
  jairos = [];
  // We'll create a bunch of names; you will later replace images with real artwork.
  const rarities = [
    {k:'common', c:20},
    {k:'uncommon', c:12},
    {k:'rare', c:8},
    {k:'ultrarare', c:4},
    {k:'legendary', c:3},
    {k:'mythic', c:1}
  ];
  let idCounter = 1;
  rarities.forEach(r=>{
    for(let i=0;i<r.c;i++){
      const id = 'j'+(idCounter++);
      const name = `${r.k.slice(0,3).toUpperCase()} Jairo ${i+1}`;
      const color = randomColorForRarity(r.k);
      const img = makePlaceholder(name, color, 512);
      jairos.push({ id, name, rarity: r.k, image: img });
    }
  });
  // shuffle
  shuffleArray(jairos);
  // load inventory if any
  loadInventory();
  renderInventory();
  renderInvPreview();
  updateStatsUI();
  alert('Seeded ' + jairos.length + ' sample Jairos.');
}

// small color helper
function randomColorForRarity(r){
  switch(r){
    case 'mythic': return '#ffde59';
    case 'legendary': return '#ff9f1c';
    case 'ultrarare': return '#8e2de2';
    case 'rare': return '#1e90ff';
    case 'uncommon': return '#00cc66';
    default: return '#666';
  }
}

// ----------------------------
// small utilities
// ----------------------------
function shuffleArray(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function updateStatsUI(){ spinCountEl.textContent = spinStats.spins; overloadMeterEl.textContent = spinStats.spinsSinceLastOverload; }

// pick final with base weights
function pickJairo(){ return pickByWeights(N_WEIGHTS); }

// ----------------------------
// Init
// ----------------------------
loadInventory();
seedExampleJairos(); // pre-seed so demo works immediately
updateStatsUI();

// ----------------------------
// small touch: click overlay to cancel if spinner stuck (dev only)
// ----------------------------
overlay.addEventListener('click', (e)=>{ /* do nothing so clicks don't pass */ });

</script>
