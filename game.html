<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jairos Roulette</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:monospace; color:#0f0; }
    #lobbyScreen { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
    #lobbyScreen h1 { font-size:3em; margin-bottom:30px; text-shadow:0 0 20px #0f0; }
    #lobbyScreen input { padding:15px; font-size:1.5em; background:#111; color:#0f0; border:2px solid #0f0; margin:10px; width:80vw; max-width:300px; text-align:center; }
    #lobbyScreen button { padding:15px 30px; font-size:1.5em; background:#300; color:#0f0; border:2px solid #0f0; margin:10px; cursor:pointer; }
    #lobbyList { margin-top:20px; color:#0f0; font-size:1.2em; max-height:200px; overflow-y:auto; }
    .lobby-item { margin:10px; padding:10px; background:#111; border:1px solid #0f0; }
    #waitingScreen { display:none; position:absolute; inset:0; background:#000; color:#0f0; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:2em; text-align:center; }
    #waitingScreen #dots { font-size:1.5em; animation: dots 1.5s infinite; }
    @keyframes dots { 0%,100% { content: "."; } 33% { content: ".."; } 66% { content: "..."; } }
    #ui { position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,20,0,0.8); padding:20px; border:3px solid #0f0; border-radius:10px; }
    button { background:#300; color:#0f0; border:2px solid #0f0; padding:15px 30px; margin:10px; font-size:1.5em; cursor:pointer; }
    button:disabled { opacity:0.4; cursor:not-allowed; }
    #startMatch { background:#0a0 !important; }
    #deathOverlay, #reviveOverlay { position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity 1s; }
    #deathOverlay { background:#f00; }
    #reviveOverlay { background:#fff; filter:blur(20px); }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0tbUqzIN1klxMykCcI9rg1a2EVZqMbtw",
      authDomain: "cookie-clicker-chat.firebaseapp.com",
      databaseURL: "https://cookie-clicker-chat-default-rtdb.firebaseio.com",
      projectId: "cookie-clicker-chat",
      storageBucket: "cookie-clicker-chat.firebasestorage.app",
      messagingSenderId: "758507208645",
      appId: "1:758507208645:web:068b66b4eb6ab4753555ac"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="lobbyScreen">
    <h1>JAIRO ROULETTE</h1>
    <input type="text" id="username" placeholder="Enter your name..." maxlength="12">
    <button id="createLobby">Create Lobby</button>
    <div style="margin:20px">
      <input type="text" id="lobbyIdInput" placeholder="Or enter lobby ID to join..." maxlength="10">
      <button id="joinSpecific">Join Lobby</button>
    </div>
    <h3>Open Lobbies</h3>
    <div id="lobbyList"></div>
  </div>

  <div id="waitingScreen">
    <h1>Waiting for another player(ur not btw, this things broken)</h1>
    <div id="dots">...</div>
  </div>

  <div id="gameScreen" style="display:none">
    <div id="ui">
      <div id="players"></div>
      <div id="lives"></div>
      <div id="shells">Shells: ? live / ? blank</div>
      <button id="selfBtn">SHOOT SELF</button>
      <button id="dealerBtn">SHOOT DEALER</button>
      <button id="startMatch" style="display:none">START MATCH</button>
      <div id="status">Your turn...</div>
    </div>
    <div id="deathOverlay"></div>
    <div id="reviveOverlay"></div>
  </div>

  <audio id="pump" src="https://freesound.org/data/previews/276/276486_5123854-lq.mp3"></audio>
  <audio id="empty" src="https://freesound.org/data/previews/387/387184_7253504-lq.mp3"></audio>
  <audio id="boom" src="https://freesound.org/data/previews/397/397355_5123854-lq.mp3"></audio>
  <audio id="shock" src="https://freesound.org/data/previews/276/276183_5123854-lq.mp3"></audio>

  <script>
    let playerName = "";
    let lobbyId = "";
    let isHost = false;
    let myTurn = false;
    let scene, camera, renderer, controls, shotgun, dealer;

    const lobbyScreen = document.getElementById("lobbyScreen");
    const waitingScreen = document.getElementById("waitingScreen");
    const gameScreen = document.getElementById("gameScreen");
    const deathOverlay = document.getElementById("deathOverlay");
    const reviveOverlay = document.getElementById("reviveOverlay");
    const lobbyList = document.getElementById("lobbyList");
    const lobbyIdInput = document.getElementById("lobbyIdInput");

    const deathQuotes = ["oof..", "better luck next time..", "tsk tsk tsk..", "bruh.", "u lwk suck.", "couldn't make it huh?", "sucks to suck.", "oh well.."];
    const reviveQuotes = ["but you still have a chance..", "nah, you'd win, right?", "not done yet..", "get up."];

    // Update lobby list
    db.ref("buckshot_lobbies").on("value", snap => {
      lobbyList.innerHTML = "";
      const lobbies = snap.val() || {};
      Object.entries(lobbies).forEach(([id, data]) => {
        if (!data.full && Object.keys(data.players || {}).length < 2) {
          const div = document.createElement("div");
          div.className = "lobby-item";
          div.innerHTML = `<strong>Lobby \( {id.slice(-4)}</strong> - \){Object.keys(data.players || {}).length}/2 players - <button onclick="joinSpecific('${id}')">Join</button>`;
          lobbyList.appendChild(div);
        }
      });
    });

    // Create lobby
    document.getElementById("createLobby").onclick = () => {
      playerName = document.getElementById("username").value.trim() || "Player" + Math.floor(Math.random()*9999);
      lobbyId = "L" + Date.now().toString().slice(-6);
      isHost = true;
      lobbyScreen.style.display = "none";
      waitingScreen.style.display = "flex";
      joinLobby();
    };

    // Join specific
    document.getElementById("joinSpecific").onclick = () => {
      playerName = document.getElementById("username").value.trim() || "Player" + Math.floor(Math.random()*9999);
      lobbyId = lobbyIdInput.value.trim().toUpperCase();
      if (lobbyId) {
        lobbyScreen.style.display = "none";
        waitingScreen.style.display = "flex";
        joinLobby();
      }
    };
    window.joinSpecific = (id) => {
      lobbyIdInput.value = id;
      document.getElementById("joinSpecific").click();
    };

    function joinLobby() {
      const lobbyRef = db.ref("buckshot_lobbies/" + lobbyId);
      lobbyRef.child("players/" + playerName).set({ lives:5, charges:5 });
      if (isHost) {
        lobbyRef.set({ host:playerName, full:false, live:0, blank:0, turn:null, shellsLoaded:false, round:1 });
      }

      lobbyRef.on("value", snap => {
        const data = snap.val();
        if (!data) return location.reload();

        const players = Object.keys(data.players || {});
        if (players.length === 2 && !data.full) {
          lobbyRef.update({ full:true });
          waitingScreen.style.display = "none";
          gameScreen.style.display = "block";
          init3D();
          if (isHost) document.getElementById("startMatch").style.display = "inline-block";
          newRound();
        }

        document.getElementById("players").textContent = players.join(" vs ");
        const myData = data.players[playerName];
        if (myData) document.getElementById("lives").innerHTML = `Charges: \( {"█".repeat(myData.charges)} ( \){myData.lives} lives left)`;

        document.getElementById("shells").textContent = `Shells: \( {data.live||0} live / \){data.blank||0} blank`;
        myTurn = data.turn === playerName;
        document.getElementById("selfBtn").disabled = !myTurn;
        document.getElementById("dealerBtn").disabled = !myTurn;
        document.getElementById("status").textContent = myTurn ? "YOUR TURN" : "OPPONENT'S TURN";
      });
    }

    // Host start
    document.getElementById("startMatch").onclick = () => {
      newRound();
      document.getElementById("startMatch").style.display = "none";
    };

    function newRound() {
      const live = Math.floor(Math.random()*4)+2;
      const blank = 8 - live;
      db.ref("buckshot_lobbies/" + lobbyId).update({
        live, blank, turn: Object.keys(db.ref("buckshot_lobbies/" + lobbyId + "/players").once("value").then(s=>s.val()))[0], shellsLoaded:true
      });
    }

    function shoot(self) {
      if (!myTurn) return;
      document.getElementById("pump").play();
      shotgun.scale.set(1.1,1.1,1.1);
      setTimeout(()=>shotgun.scale.set(1,1,1),200);

      db.ref("buckshot_lobbies/" + lobbyId).once("value").then(snap => {
        const data = snap.val();
        const isLive = Math.random() < (data.live / (data.live + data.blank));

        if (isLive) {
          document.getElementById("boom").play();
          deathOverlay.style.opacity = 1;
          setTimeout(() => {
            deathOverlay.style.opacity = 0;
            document.body.style.background = "#000";
            const msg = deathQuotes[Math.floor(Math.random()*deathQuotes.length)];
            document.getElementById("status").innerHTML = `<div style="font-size:3em;color:#f00">${msg}</div>`;

            const target = self ? playerName : Object.keys(data.players).find(p=>p!==playerName);
            db.ref("buckshot_lobbies/" + lobbyId + "/players/" + target + "/lives").transaction(v => v-1);

            setTimeout(() => {
              db.ref("buckshot_lobbies/" + lobbyId + "/players/" + target).once("value").then(psnap => {
                const lives = psnap.val().lives;
                if (lives > 0) {
                  document.getElementById("shock").play();
                  reviveOverlay.style.opacity = 1;
                  document.getElementById("status").innerHTML += `<br><br>${reviveQuotes[Math.floor(Math.random()*reviveQuotes.length)]}`;
                  setTimeout(() => {
                    reviveOverlay.style.opacity = 0;
                    renderer.domElement.style.filter = "blur(20px)";
                    setTimeout(() => renderer.domElement.style.filter = "", 3000);
                  }, 1500);
                } else {
                  endGame(self ? "YOU LOSE" : "YOU WIN");
                }
              });
            }, 2000);
          }, 1000);
        } else {
          document.getElementById("empty").play();
        }

        const newLive = data.live - (isLive?1:0);
        const newBlank = data.blank - (isLive?0:1);
        const nextTurn = Object.keys(data.players).find(p => p !== playerName);

        if (newLive + newBlank === 0) {
          newRound();
        } else {
          db.ref("buckshot_lobbies/" + lobbyId).update({ live:newLive, blank:newBlank, turn:nextTurn });
        }
      });
    }

    function endGame(msg) {
      document.getElementById("status").innerHTML = `<div style="font-size:4em;color:#f00">\( {msg}</div><br> \){deathQuotes[Math.floor(Math.random()*deathQuotes.length)]}`;
      document.getElementById("selfBtn").disabled = true;
      document.getElementById("dealerBtn").disabled = true;
    }

    document.getElementById("selfBtn").onclick = () => shoot(true);
    document.getElementById("dealerBtn").onclick = () => shoot(false);

    function init3D() {
      // [3D code from previous — table, shotgun, dealer, lights, mouse aim, animate]
      // ... (paste the full 3D block from my earlier message to complete)
    }

    window.onresize = () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    };
  </script>
</body>
</html>
