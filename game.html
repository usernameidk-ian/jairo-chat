<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jairo Spin</title>
<style>
  :root{
    --bg1:#062; --bg2:#600;
    --panel-bg: rgba(0,0,0,.78);
    --accent: #00ff66;
    --glass: rgba(255,255,255,0.04);
    --text: #fff;
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial; background:linear-gradient(135deg,var(--bg1),var(--bg2)); color:var(--text);}
  .app {max-width:960px; margin:28px auto; padding:24px; position:relative;}

  header {display:flex;align-items:center;justify-content:space-between; gap:12px;}
  h1{margin:0;font-size:22px;letter-spacing:0.6px}
  .btn {
    background: linear-gradient(180deg,#111,#000);
    border:1px solid rgba(255,255,255,0.06);
    color:#fff;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:700;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
  }
  .btn.primary { background: linear-gradient(180deg,#00d27a,#00783f); color:#000; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
  .btn:active{transform:translateY(1px)}

  .panel {
    margin-top:20px; background:var(--panel-bg); border-radius:14px; padding:20px; display:flex; gap:20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .left {flex:1; min-width:340px;}
  .center {width:420px; display:flex; flex-direction:column; align-items:center; gap:14px;}
  .right {width:280px;}

  .spin-card {
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border-radius:12px; padding:16px; display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .big-spin {
    width:220px; height:220px; border-radius:16px; background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.08); position:relative; overflow:hidden;
    display:grid; place-items:center;
  }
  .spin-button.primary {
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    width:130px; padding:14px 20px; border-radius:999px; font-weight:900; letter-spacing:1px;
    background:linear-gradient(180deg,#ffd85c,#ff9f1c); color:#000;
    box-shadow:0 8px 26px rgba(255,160,0,0.35); border:none;
  }
  .spin-info {font-size:13px; color:#ccc; text-align:center; max-width:340px;}

  .inv {background:var(--glass); border-radius:12px; padding:12px; height:460px; overflow:auto;}
  .inv h3{margin:0 0 10px 0; font-size:15px;}
  .inv-grid {display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
  .card-mini {
    background:rgba(0,0,0,0.5); padding:8px; border-radius:10px; display:flex; gap:10px; align-items:center;
    border:1px solid rgba(255,255,255,0.05);
  }
  .card-mini img{width:48px;height:48px;border-radius:8px;object-fit:cover;}
  .card-mini .meta{font-size:12px;}
  .card-mini .count{font-weight:700; color:var(--accent);}

  .rarity-common{border-color:rgba(255,255,255,0.1);}
  .rarity-rare{box-shadow:0 0 10px rgba(0,120,255,0.2);}
  .rarity-epic{box-shadow:0 0 12px rgba(180,0,255,0.25);}
  .rarity-ultrarare{box-shadow:0 0 14px rgba(255,215,0,0.3);}
  .rarity-legendary{box-shadow:0 0 16px rgba(255,140,0,0.4);}
  .rarity-mythic{box-shadow:0 0 20px rgba(255,50,255,0.5); animation:pulse 2s infinite;}

  @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,50,255,0.5);}50%{box-shadow:0 0 30px rgba(255,50,255,0.8);}}

  .overlay {position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.75); z-index:999;}
  .spinner-window {width:min(92%,1100px); height:240px; background:rgba(10,10,10,0.9); border-radius:14px; overflow:hidden;
    display:flex; align-items:center; justify-content:center; position:relative; border:1px solid rgba(255,255,255,0.06);}
  .spinner-track {height:170px; width:100%; overflow:hidden; display:flex; align-items:center;}
  .spinner-inner {display:flex; gap:14px; transform:translateX(0);}
  .spin-item {width:150px; height:150px; border-radius:14px; background:#111; overflow:hidden; flex-shrink:0;
    border:1px solid rgba(255,255,255,0.04); position:relative;}
  .spin-item img{width:100%;height:100%;object-fit:cover;}
  .silhouette img{filter: grayscale(100%) brightness(0) contrast(2000%);
    -webkit-filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px #aaa); filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px #aaa);}
  .revealed img{filter:none; transition:filter .6s, transform .6s;}
  .reveal-glow{position:absolute; inset:0; border-radius:14px; pointer-events:none;
    box-shadow:0 0 0 rgba(255,220,120,0); transition:box-shadow .7s;}
  .reveal-glow.show{box-shadow:0 0 40px rgba(255,220,120,0.9), inset 0 0 50px rgba(255,220,120,0.2);}

  .reveal-modal {position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:1000; background:rgba(0,0,0,0.8);}
  .reveal-card {width:min(92%,540px); background:linear-gradient(180deg,#111,#000); padding:24px; border-radius:16px; text-align:center;
    border:1px solid rgba(255,255,255,0.08);}
  .reveal-card img{width:240px;height:240px;object-fit:cover;border-radius:12px;}
  .reveal-card .name{margin-top:16px;font-size:24px;font-weight:800;color:var(--accent);}
  .reveal-card .rarity{font-size:16px;color:#ccc;}
  .small{font-size:13px;color:#aaa;}

  @media(max-width:820px){.panel{flex-direction:column;}.center,.right{width:100%;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Jairo Spin</h1>
  </header>

  <div class="panel">
    <div class="left">
      <div class="spin-card">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>Fancy Spin</strong>
            <div class="spin-info">Press SPIN → watch the silhouettes → reveal your new (or dupe) Jairo!</div>
          </div>
          <div style="text-align:right; font-size:14px;">
            <div>Spins: <span id="spinCount">0</span></div>
            <div>Overload: <span id="overloadMeter">0</span>/50</div>
          </div>
        </div>

        <div class="big-spin" id="bigSpin">
          <div style="color:#777; font-size:14px;">Jairos will parade here</div>
          <button class="spin-button primary" id="spinBtn">SPIN</button>
        </div>
      </div>

      <div style="margin-top:16px; text-align:center;">
        <div class="small">Latest pull</div>
        <div id="lastResult" style="margin-top:8px; width:180px; height:180px; background:rgba(255,255,255,0.03); border-radius:12px; margin:0 auto; display:grid; place-items:center;">
          <img id="lastImg" src="" style="width:140px;height:140px;border-radius:10px;object-fit:cover;display:none;">
          <div id="lastName" style="color:#888;">—</div>
        </div>
      </div>
    </div>

    <div class="center">
      <div style="color:#aaa; text-align:center;">Press SPIN to begin</div>
    </div>

    <div class="right">
      <div class="inv">
        <h3>JairoDex (<span id="uniqueCount">0</span>/24)</h3>
        <div id="inventoryList" class="inv-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Spinner overlay -->
<div class="overlay" id="overlay">
  <div class="spinner-window">
    <div class="spinner-track">
      <div class="spinner-inner" id="spinnerInner"></div>
    </div>
    <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:170px; height:170px; border-radius:14px;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,0.06); pointer-events:none;"></div>
  </div>
</div>

<!-- Reveal modal -->
<div class="reveal-modal" id="revealModal">
  <div class="reveal-card">
    <img id="revealImg" src="" alt="">
    <div class="name" id="revealName">NAME</div>
    <div class="rarity" id="revealRarity">RARITY</div>
    <div class="small" id="dupeText" style="margin-top:8px; display:none;">+1 duplicate</div>
    <div style="height:16px"></div>
    <button class="btn primary" id="claimBtn">Nice!</button>
  </div>
</div>

<script>
// =============================
// JAIRO SPIN – FINAL VERSION
// =============================

const JAIROS = [
  // COMMON
  {id:"c1", name:"Sleepy Jairo",     rarity:"common",      img:"jairos/sleepy.png"},
  {id:"c2", name:"Side-eye Jairo",   rarity:"common",      img:"jairos/sideeye.png"},
  {id:"c3", name:"Tired Jairo",      rarity:"common",      img:"jairos/tired.png"},
  {id:"c4", name:"Eating Chips Jairo", rarity:"common",   img:"jairos/chips.png"},

  // UNCOMMON
  {id:"u1", name:"Angry Jairo",      rarity:"uncommon",    img:"jairos/angry.png"},
  {id:"u2", name:"Confused Jairo",   rarity:"uncommon",    img:"jairos/confused.png"},
  {id:"u3", name:"Scared Jairo",     rarity:"uncommon",    img:"jairos/scared.png"},
  {id:"u4", name:"Shocked Jairo",    rarity:"uncommon",    img:"jairos/shocked.png"},

  // RARE
  {id:"r1", name:"Sigma Jairo",      rarity:"rare",        img:"jairos/sigma.png"},
  {id:"r2", name:"Evil Jairo",       rarity:"rare",        img:"jairos/evil.png"},
  {id:"r3", name:"Sunglasses Jairo", rarity:"rare",        img:"jairos/sunglasses.png"},
  {id:"r4", name:"Drip Jairo",       rarity:"rare",        img:"jairos/drip.png"},

  // ULTRA RARE
  {id:"ur1", name:"Golden Jairo",    rarity:"ultrarare",   img:"jairos/golden.png"},
  {id:"ur2", name:"Glitched Jairo",  rarity:"ultrarare",   img:"jairos/glitched.png"},
  {id:"ur3", name:"8-bit Jairo",     rarity:"ultrarare",   img:"jairos/pixel.png"},
  {id:"ur4", name:"Battle Jairo",    rarity:"ultrarare",   img:"jairos/battle.png"},

  // LEGENDARY
  {id:"l1", name:"Galaxy Jairo",     rarity:"legendary",   img:"jairos/galaxy.png"},
  {id:"l2", name:"God Jairo",        rarity:"legendary",   img:"jairos/god.png"},
  {id:"l3", name:"Santa Jairo",      rarity:"legendary",   img:"jairos/santa.png"},
  {id:"l4", name:"Shadow Jairo",     rarity:"legendary",   img:"jairos/shadow.png"},

  // MYTHIC
  {id:"m1", name:"Rainbow Jairo",    rarity:"mythic",      img:"jairos/rainbow.png"},
  {id:"m2", name:"Corrupted Jairo", rarity:"mythic",      img:"jairos/corrupted.png"},
  {id:"m3", name:"Angel Jairo",      rarity:"mythic",      img:"jairos/angel.png"},
  {id:"m4", name:"Ascended Jairo",   rarity:"mythic",      img:"jairos/ascended.png"}
];

const WEIGHTS = {common:0.60, uncommon:0.25, rare:0.10, ultrarare:0.04, legendary:0.009, mythic:0.001};

let inventory = JSON.parse(localStorage.getItem("jairo_inv") || "{}");
let stats = JSON.parse(localStorage.getItem("jairo_stats") || '{"spins":0,"since":0}");

// DOM
const spinBtn = document.getElementById("spinBtn");
const overlay = document.getElementById("overlay");
const spinnerInner = document.getElementById("spinnerInner");
const revealModal = document.getElementById("revealModal");
const revealImg = document.getElementById("revealImg");
const revealName = document.getElementById("revealName");
const revealRarity = document.getElementById("revealRarity");
const dupeText = document.getElementById("dupeText");
const claimBtn = document.getElementById("claimBtn");
const inventoryList = document.getElementById("inventoryList");
const uniqueCount = document.getElementById("uniqueCount");
const spinCount = document.getElementById("spinCount");
const overloadMeter = document.getElementById("overloadMeter");
const lastImg = document.getElementById("lastImg");
const lastName = document.getElementById("lastName");

let spinning = false;

// ========================
// WEIGHTED RANDOM
// ========================
function pickJairo(overload = false) {
  let w = {...WEIGHTS};
  if (overload) {
    w.rare += 0.08; w.ultrarare += 0.04; w.legendary += 0.02; w.mythic += 0.01;
    let sum = Object.values(w).reduce((a,b)=>a+b,0);
    for (let k in w) w[k] /= sum;
  }
  const r = Math.random();
  let cum = 0;
  for (let [rarity, prob] of Object.entries(w)) {
    cum += prob;
    if (r < cum) {
      const pool = JAIROS.filter(j => j.rarity === rarity);
      return pool[Math.floor(Math.random() * pool.length)];
    }
  }
  return JAIROS[0];
}

// ========================
// INVENTORY
// ========================
function addJairo(jairo) {
  if (!inventory[jairo.id]) inventory[jairo.id] = 0;
  inventory[jairo.id]++;
  localStorage.setItem("jairo_inv", JSON.stringify(inventory));
  renderInventory();
}
function renderInventory() {
  inventoryList.innerHTML = "";
  "";
  const owned = Object.keys(inventory).length;
  uniqueCount.textContent = owned;

  JAIROS.forEach(j => {
    const count = inventory[j.id] || 0;
    if (count === 0) return;

    const div = document.createElement("div");
    div.className = `card-mini rarity-${j.rarity}`;
    div.innerHTML = `
      <img src="\( {j.img}" alt=" \){j.name}">
      <div class="meta">
        <div style="font-weight:700">${j.name}</div>
        <div style="color:#aaa">\( {j.rarity.toUpperCase()} <span class="count">× \){count}</span></div>
      </div>
    `;
    inventoryList.appendChild(div);
  });

  // update "latest pull" preview
  const lastId = Object.keys(inventory).pop();
  if (lastId) {
    const lastJ = JAIROS.find(x=>x.id===lastId);
    lastImg.src = lastJ.img;
    lastImg.style.display = "block";
    lastName.textContent = `\( {lastJ.name} × \){inventory[lastId]}`;
  }
}

// ========================
// SPIN LOGIC
// ========================
spinBtn.addEventListener("click", () => {
  if (spinning) return;
  spinning = true;

  stats.spins++;
  stats.since++;
  localStorage.setItem("jairo_stats", JSON.stringify(stats));
  spinCount.textContent = stats.spins;
  overloadMeter.textContent = stats.since;

  // overload chance
  let overload = false;
  if (stats.since >= 50 && Math.random() < 0.25) {
    overload = true;
    stats.since = 0;
    localStorage.setItem("jairo_stats", JSON.stringify(stats));
    overloadMeter.textContent = "0 (OVERLOAD!)";
  }

  const winner = pickJairo(overload);
  const pool = buildPool(winner);
  populateSpinner(pool);
  overlay.style.display = "flex";

  // animation (same as before, just cleaned)
  const itemW = 164; // 150 + 14 gap
  const items = spinnerInner.children;
  const middle = Math.floor(items.length / 2);
  const target = middle * itemW;

  let start = performance.now();
  const duration = 3200 + Math.random()*800;

  function frame(t) {
    const prog = Math.min(1, (t - start)/duration);
    const eased = 1 - Math.pow(1-prog, 3);
    const distance = -target - 2000 - Math.random()*800; // extra rolls
    const x = distance * eased;
    spinnerInner.style.transform = `translateX(${x}px)`;
    if (prog < 1) requestAnimationFrame(frame);
    else endSpin(winner);
  }
  requestAnimationFrame(frame);
});

function buildPool(winner) {
  let base = [...JAIROS];
  for (let i=base.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [base[i],base[j]] = [base[j],base[i]];
  }
  const pool = [];
  for (let i=0;i<7;i++) pool.push(...base);
  // guarantee winner appears several times
  const mid = Math.floor(pool.length/2);
  pool.splice(mid,0,winner,winner,winner);
  return pool;
}

function populateSpinner(pool) {
  spinnerInner.innerHTML = "";
  pool.forEach(j => {
    const el = document.createElement("div");
    el.className = "spin-item";
    if (inventory[j.id]) el.classList.add("revealed"); else el.classList.add("silhouette");
    el.dataset.id = j.id;
    const img = document.createElement("img");
    img.src = j.img;
    el.appendChild(img);
    const glow = document.createElement("div");
    glow.className = "reveal-glow";
    el.appendChild(glow);
    spinnerInner.appendChild(el);
  });
}

function endSpin(jairo) {
  setTimeout(() => {
    overlay.style.display = "none";
    const isDupe = inventory[jairo.id];
    addJairo(jairo);
    revealImg.src = jairo.img;
    revealName.textContent = jairo.name;
    revealRarity.textContent = jairo.rarity.toUpperCase();
    dupeText.style.display = isDupe ? "block" : "none";
    revealModal.style.display = "flex";

    // glow effect on the winning card
    document.querySelector(`.spin-item[data-id="${jairo.id}"] .reveal-glow`)?.classList.add("show");

    spinning = false;
  }, 600);
}

claimBtn.onclick = () => revealModal.style.display = "none";

// init
renderInventory();
spinCount.textContent = stats.spins;
overloadMeter.textContent = stats.since;
</script>
</body>
</html>
