<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>JAIRO ROULETTE</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    /* layout */
    body { margin:0; overflow:hidden; background:#000; font-family:monospace; color:#0f0; }
    #lobbyScreen, #waitingScreen, #gameScreen { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
    #lobbyScreen { flex-direction:column; z-index:100; }
    h1 { font-size:2.2em; margin:0 0 18px; text-shadow:0 0 18px #0f0; }
    input[type="text"] { padding:12px; font-size:1.1em; background:#111; color:#0f0; border:2px solid #0f0; margin:8px; width:80vw; max-width:360px; text-align:center; }
    .smallcontrols { display:flex; gap:8px; align-items:center; margin:8px 0; }
    .smallcontrols input { width:auto; text-align:left; padding:8px; }
    #lobbyList { margin-top:16px; width:92%; max-width:520px; }
    .lobby-item { margin:8px 0; padding:10px; background:#111; border:1px solid #0f0; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .lobby-item button { padding:6px 10px; font-size:0.95em; cursor:pointer; background:#222; color:#0f0; border:1px solid #0f0; }
    .lobby-controls { display:flex; gap:6px; align-items:center; }

    /* waiting */
    #waitingScreen { display:none; flex-direction:column; color:#0f0; font-size:1.6em; }
    #waitingScreen .dots { margin-top:10px; animation:dots 1.5s infinite; }
    @keyframes dots { 0%{opacity:0} 50%{opacity:1} 100%{opacity:0} }

    /* game UI */
    #gameScreen { display:none; }
    #ui { position:fixed; top:16px; left:16px; z-index:20; background:rgba(0,20,0,0.85); padding:12px; border:2px solid #0f0; border-radius:8px; width:320px; }
    #ui div { color:#0f0; margin-bottom:8px; }
    button.big { display:block; margin:6px 0; padding:10px 12px; background:#300; color:#0f0; border:2px solid #0f0; cursor:pointer; font-size:1.1em; width:100%; }
    button.big:disabled { opacity:0.4; cursor:not-allowed; }

    #status { margin-top:8px; font-size:1.1em; color:#ff7b7b; min-height:40px; }

    /* overlays */
    #deathOverlay, #reviveOverlay { position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity .6s; z-index:15; }
    #deathOverlay { background:rgba(255,0,0,0.55); }
    #reviveOverlay { background:rgba(255,255,255,0.6); backdrop-filter:blur(6px); }

    /* renderer container: world will append here */
    #threeContainer { position:fixed; inset:0; z-index:1; }
  </style>
</head>
<body>
  <!-- LOBBY -->
  <div id="lobbyScreen">
    <h1>JAIRO ROULETTE</h1>
    <input id="username" type="text" placeholder="Enter your name..." maxlength="15" />
    <div class="smallcontrols">
      <button id="createLobby">Create Lobby</button>
      <input id="lobbyIdInput" type="text" placeholder="Or enter lobby ID to join..." maxlength="12" />
      <button id="joinSpecific">Join Lobby</button>
    </div>

    <div style="margin-top:12px; width:92%; max-width:520px; text-align:center; color:#0f0">
      <div style="margin-bottom:8px">Open Lobbies (click Join)</div>
      <div id="lobbyList"></div>

      <div style="margin-top:14px; display:flex; gap:8px; justify-content:center; align-items:center;">
        <input id="adminPasswordInput" type="text" placeholder="Enter admin password to manage" style="width:220px" />
        <button id="setAdminBtn">Unlock</button>
        <button id="purgeBtn" title="Remove inactive lobbies" style="display:none">Purge Inactive</button>
      </div>
      <small style="display:block; margin-top:8px; color:#8f8">bunch of bugs, dont be surprised if something<strong>breaks.</strong> (sigh)</small>
    </div>
  </div>

  <!-- WAITING -->
  <div id="waitingScreen">
    <div>Waiting for opponent to join</div>
    <div class="dots">.</div>
  </div>

  <!-- GAME -->
  <div id="gameScreen">
    <div id="ui">
      <div id="players">Players: —</div>
      <div id="lives">Charges: —</div>
      <div id="shells">Shells: —</div>
      <button id="selfBtn" class="big" disabled>SHOOT SELF</button>
      <button id="dealerBtn" class="big" disabled>SHOOT DEALER</button>
      <button id="startMatch" class="big" style="background:#0a0; display:none">START MATCH</button>
      <div id="status"></div>
      <div style="margin-top:6px"><button id="leaveBtn" style="background:#222;color:#0f0;border:1px solid #0f0;padding:6px">Leave Match</button></div>
    </div>

    <div id="deathOverlay"></div>
    <div id="reviveOverlay"></div>
    <div id="threeContainer"></div>
  </div>

  <!-- sounds (replace with your mp3 later) -->
  <audio id="pump" src="pump.mp3"></audio>
  <audio id="empty" src="empty.mp3"></audio>
  <audio id="boom" src="boom.mp3"></audio>
  <audio id="shock" src="shock.mp3"></audio>

  <!-- firebase + three -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/controls/OrbitControls.js"></script>

  <script>
  /***** CONFIGURE FIREBASE (same as your other pages) *****/
  const firebaseConfig = {
    apiKey: "AIzaSyA0tbUqzIN1klxMykCcI9rg1a2EVZqMbtw",
    authDomain: "cookie-clicker-chat.firebaseapp.com",
    databaseURL: "https://cookie-clicker-chat-default-rtdb.firebaseio.com",
    projectId: "cookie-clicker-chat",
    storageBucket: "cookie-clicker-chat.firebasestorage.app",
    messagingSenderId: "758507208645",
    appId: "1:758507208645:web:068b66b4eb6ab4753555ac"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  /***** STATE *****/
  let playerName = "";
  let lobbyId = "";
  let isHost = false;
  let myTurn = false;
  let rendererAppended = false;
  let renderer, scene, camera, controls, shotgun, dealer;

  // DOM refs
  const el = {
    lobby: document.getElementById('lobbyScreen'),
    waiting: document.getElementById('waitingScreen'),
    game: document.getElementById('gameScreen'),
    players: document.getElementById('players'),
    lives: document.getElementById('lives'),
    shells: document.getElementById('shells'),
    status: document.getElementById('status'),
    startBtn: document.getElementById('startMatch'),
    lobbyList: document.getElementById('lobbyList'),
    adminPasswordInput: document.getElementById('adminPasswordInput'),
    setAdminBtn: document.getElementById('setAdminBtn'),
    purgeBtn: document.getElementById('purgeBtn')
  };

  const MASTER_PASSWORD = "haha123";
  let adminUnlocked = false;

  /***** LOBBY LIST UI + ADMIN PURGE/DELETE *****/
  // show lobbies that are not full or not started. Add Delete button if adminUnlocked.
  db.ref('buckshot_lobbies').on('value', snap => {
    const obj = snap.val() || {};
    el.lobbyList.innerHTML = '';
    Object.entries(obj).forEach(([id, data]) => {
      const playersCount = data.players ? Object.keys(data.players).length : 0;
      // show only lobbies that are not started
      if (data.gameStarted) return;
      const div = document.createElement('div');
      div.className = 'lobby-item';
      const label = document.createElement('div');
      label.textContent = `${data.host || 'Host'}'s lobby (${playersCount}/2) — ID: ${id}`;
      div.appendChild(label);

      const ctrl = document.createElement('div');
      ctrl.className = 'lobby-controls';
      const joinBtn = document.createElement('button');
      joinBtn.textContent = 'Join';
      joinBtn.onclick = () => {
        document.getElementById('lobbyIdInput').value = id;
        document.getElementById('joinSpecific').click();
      };
      ctrl.appendChild(joinBtn);

      if (adminUnlocked) {
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑';
        delBtn.title = 'Delete lobby (admin)';
        delBtn.onclick = () => {
          if (confirm('Delete lobby ' + id + ' ?')) db.ref('buckshot_lobbies/' + id).remove();
        };
        ctrl.appendChild(delBtn);
      }
      div.appendChild(ctrl);
      el.lobbyList.appendChild(div);
    });
  });

  // admin unlock button
  el.setAdminBtn.addEventListener('click', () => {
    const pass = el.adminPasswordInput.value || '';
    if (pass === MASTER_PASSWORD) {
      adminUnlocked = true;
      el.purgeBtn.style.display = 'inline-block';
      alert('Admin unlocked. You can now delete lobbies.');
    } else {
      alert('Wrong password.');
    }
  });

  el.purgeBtn.addEventListener('click', () => {
    // purge stale lobbies (simple strategy: remove lobbies with 0 players OR older than 1h)
    db.ref('buckshot_lobbies').once('value').then(snap => {
      const now = Date.now();
      snap.forEach(child => {
        const data = child.val();
        const id = child.key;
        const players = data.players ? Object.keys(data.players).length : 0;
        const createdAt = data.createdAt || 0;
        if (players === 0 || (createdAt && now - createdAt > 1000 * 60 * 60)) {
          db.ref('buckshot_lobbies/' + id).remove();
        }
      });
      alert('Purge complete.');
    });
  });

  /***** LOBBY CREATE / JOIN flow *****/
  document.getElementById('createLobby').onclick = () => {
    const uname = (document.getElementById('username').value || '').trim();
    playerName = uname || 'Player' + Math.floor(Math.random() * 9999);
    isHost = true;
    lobbyId = 'L' + Date.now().toString(36).toUpperCase().slice(-8);
    // create lobby atomically: set base object then add player
    const lobbyRef = db.ref('buckshot_lobbies/' + lobbyId);
    const lobbyObj = {
      host: playerName,
      createdAt: Date.now(),
      full: false,
      gameStarted: false,
      live: 0,
      blank: 0,
      turn: null
    };
    lobbyRef.set(lobbyObj).then(() => {
      lobbyRef.child('players/' + playerName).set({ lives: 5, charges: 5 });
      // move to waiting
      el.lobby.style.display = 'none';
      el.waiting.style.display = 'flex';
      setupLobbyListeners(lobbyId);
    });
  };

  document.getElementById('joinSpecific').onclick = () => {
    const id = (document.getElementById('lobbyIdInput').value || '').trim().toUpperCase();
    if (!id) return alert('Enter lobby ID');
    joinGame(id);
  };

  function joinGame(id) {
    playerName = (document.getElementById('username').value || '').trim() || 'Player' + Math.floor(Math.random() * 9999);
    isHost = false;
    lobbyId = id;
    const lobbyRef = db.ref('buckshot_lobbies/' + lobbyId);
    // ensure lobby exists and not full and not started
    lobbyRef.once('value').then(snap => {
      const data = snap.val();
      if (!data) return alert('Lobby not found.');
      if (data.gameStarted) return alert('Game already started here.');
      const players = data.players ? Object.keys(data.players) : [];
      if (players.length >= 2) return alert('Lobby is full.');
      // add player safely
      lobbyRef.child('players/' + playerName).set({ lives: 5, charges: 5 }).then(() => {
        el.lobby.style.display = 'none';
        el.waiting.style.display = 'flex';
        setupLobbyListeners(lobbyId);
      });
    });
  }

  /***** Setup listeners for a particular lobbyId *****/
  function setupLobbyListeners(id) {
    const lobbyRef = db.ref('buckshot_lobbies/' + id);

    // listen lobby changes
    lobbyRef.on('value', snap => {
      const data = snap.val();
      if (!data) {
        alert('Lobby closed or removed.');
        location.reload();
        return;
      }

      const players = data.players ? Object.keys(data.players) : [];
      el.players.textContent = (players.length ? players.join(' vs ') : 'Players: —');

      // when two players present and game hasn't started -> start it
      if (players.length === 2 && !data.gameStarted) {
        // set started & first turn
        const first = players[Math.floor(Math.random() * players.length)];
        lobbyRef.update({ gameStarted: true, full: true, turn: first }).then(() => {
          // show game UI for both clients
          el.waiting.style.display = 'none';
          el.game.style.display = 'block';
          if (!rendererAppended) init3D(); // append 3D renderer once
          // host shows start button to seed shells (optional)
          if (isHost) el.startBtn.style.display = 'block';
        });
      }

      // update UI stats
      const myData = data.players ? data.players[playerName] : null;
      if (myData) {
        // ensure charges/lives present
        el.lives.innerHTML = `Charges: ${'█'.repeat(Math.max(0, myData.charges || 0))} (${Math.max(0, myData.lives || 0)} lives)`;
      }
      el.shells.textContent = `Shells: ${data.live || 0} live / ${data.blank || 0} blank`;

// ===== TURN HANDLING FIX =====
if (data.players && Object.keys(data.players).length === 2) {
  const currentTurn = data.turn || Object.keys(data.players)[0];
  if (data.turn !== currentTurn) {
    // if Firebase didn’t set turn yet, pick first player
    db.ref('buckshot_lobbies/' + id).update({ turn: currentTurn });
  }
  const isMyTurnNow = currentTurn === playerName;
  
  // update buttons and status
  document.getElementById('selfBtn').disabled = !isMyTurnNow;
  document.getElementById('dealerBtn').disabled = !isMyTurnNow;
  el.status.textContent = isMyTurnNow ? 'YOUR TURN' : "OPPONENT'S TURN";

  // ensure myTurn variable stays correct for shooting function
  myTurn = isMyTurnNow;
}

      // if someone died -> check end condition
      const alivePlayers = players.filter(p => (data.players && data.players[p] && (data.players[p].lives || 0) > 0));
      if (alivePlayers.length === 1 && data.gameStarted) {
        const winner = alivePlayers[0];
        endGame(winner === playerName ? 'YOU WIN' : 'YOU LOSE');
      }
    });
  }

  /***** Start match (host seeds shells and first turn if not set) *****/
  el.startBtn.addEventListener('click', () => {
    if (!lobbyId) return;
    const lobbyRef = db.ref('buckshot_lobbies/' + lobbyId);
    lobbyRef.once('value').then(snap => {
      const data = snap.val() || {};
      const live = Math.floor(Math.random() * 4) + 2; // 2..5
      const blank = 8 - live;
      const players = data.players ? Object.keys(data.players) : [];
      const first = data.turn || (players.length ? players[Math.floor(Math.random() * players.length)] : null);
      lobbyRef.update({ live, blank, turn: first, gameStarted: true, full: true });
      el.startBtn.style.display = 'none';
    });
  });

  /***** newRound helper (called when shells depleted) *****/
  function newRound() {
    if (!lobbyId) return;
    const lobbyRef = db.ref('buckshot_lobbies/' + lobbyId);
    lobbyRef.child('players').once('value').then(snap => {
      const players = snap.val() ? Object.keys(snap.val()) : [];
      const live = Math.floor(Math.random() * 4) + 2;
      const blank = 8 - live;
      const first = players.length ? players[Math.floor(Math.random() * players.length)] : null;
      lobbyRef.update({ live, blank, turn: first });
    });
  }

  /***** SHOOT logic (handles turn, lives, audio, overlays) *****/
  function shoot(self) {
    if (!myTurn) return;
    // small visual/audio
    document.getElementById('pump').play().catch(()=>{});
    if (shotgun) shotgun.scale.set(1.1,1.1,1.1);
    setTimeout(()=>{ if (shotgun) shotgun.scale.set(1,1,1); }, 220);

    const lobbyRef = db.ref('buckshot_lobbies/' + lobbyId);
    lobbyRef.once('value').then(snap => {
      const data = snap.val();
      if (!data) return;

      const total = (data.live || 0) + (data.blank || 0);
      const isLive = Math.random() < ((data.live || 0) / Math.max(1, total));
      const target = self ? playerName : Object.keys(data.players).find(p => p !== playerName);

      if (isLive) {
        // live shell: kill or reduce life
        document.getElementById('boom').play().catch(()=>{});
        deathOverlay.style.opacity = 1;
        setTimeout(() => deathOverlay.style.opacity = 0, 900);

        // decrement target's lives using transaction (safe)
        const targetRef = lobbyRef.child('players').child(target).child('lives');
        targetRef.transaction(val => {
          if (val === null) return 0;
          return Math.max(0, val - 1);
        }).then(() => {
          // after tx, check remaining lives
          lobbyRef.child('players').child(target).once('value').then(tsnap => {
            const tdata = tsnap.val() || {};
            const livesLeft = Math.max(0, tdata.lives || 0);
            if (livesLeft > 0) {
              document.getElementById('shock').play().catch(()=>{});
              reviveOverlay.style.opacity = 1;
              setTimeout(()=> reviveOverlay.style.opacity = 0, 1100);
            } else {
              // target died; check winner in value listener (it will end the game)
            }
          });
        }).catch(()=>{});
      } else {
        // blank shell
        document.getElementById('empty').play().catch(()=>{});
      }

      // update shell counts and next turn
      const newLive = Math.max(0, (data.live || 0) - (isLive ? 1 : 0));
      const newBlank = Math.max(0, (data.blank || 0) - (isLive ? 0 : 1));
      // compute next turn (the other player)
      const players = data.players ? Object.keys(data.players) : [];
      const nextTurn = players.find(p => p !== playerName) || playerName;

      // if shells exhausted -> new round, but still pick nextTurn as random in newRound
      if (newLive + newBlank === 0) {
        // update counts first, then start new round after brief delay
        lobbyRef.update({ live: newLive, blank: newBlank, turn: nextTurn }).then(()=>{
          setTimeout(newRound, 900);
        });
      } else {
        lobbyRef.update({ live: newLive, blank: newBlank, turn: nextTurn });
      }
    });
  }

  document.getElementById('selfBtn').onclick = () => shoot(true);
  document.getElementById('dealerBtn').onclick = () => shoot(false);

  /***** END GAME handler (shows message and disables buttons) *****/
  function endGame(msg) {
    el.status.innerHTML = `<div style="font-size:2em;color:#f66">${msg}</div>`;
    document.getElementById('selfBtn').disabled = true;
    document.getElementById('dealerBtn').disabled = true;
    // mark lobby as finished
    if (lobbyId) db.ref('buckshot_lobbies/' + lobbyId).update({ gameStarted: false, full: false });
  }

  /***** LEAVE lobby (cleanup) *****/
  document.getElementById('leaveBtn').addEventListener('click', () => {
    if (!lobbyId) return location.reload();
    const lobbyRef = db.ref('buckshot_lobbies/' + lobbyId);
    // remove this player
    lobbyRef.child('players').child(playerName).remove().then(()=>{
      // if host leaving, delete lobby
      lobbyRef.once('value').then(snap => {
        const data = snap.val();
        if (!data || !data.players || Object.keys(data.players).length === 0) {
          lobbyRef.remove();
        } else if (isHost) {
          // if host left but others remain, pick new host
          const players = Object.keys(data.players || {});
          if (players.length) lobbyRef.update({ host: players[0] });
        }
      });
      location.reload();
    });
  });

  /***** 3D initialization (only append renderer once) *****/
  function init3D() {
    if (rendererAppended) return;
    rendererAppended = true;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 4, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.inset = 0;

    document.getElementById('threeContainer').appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // simple table/shotgun/dealer visuals
    const table = new THREE.Mesh(new THREE.BoxGeometry(12, 0.5, 10), new THREE.MeshStandardMaterial({ color: 0x002200 }));
    table.position.y = -0.25; scene.add(table);

    shotgun = new THREE.Group();
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4, 16), new THREE.MeshStandardMaterial({ color: 0x888888 }));
    barrel.rotation.z = Math.PI / 2; barrel.position.x = 2;
    const stock = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 0.8), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
    stock.position.x = -0.8;
    shotgun.add(barrel, stock);
    shotgun.position.y = 0.4; scene.add(shotgun);

    dealer = new THREE.Group();
    const skull = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 16), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    const leftHand = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), new THREE.MeshStandardMaterial({ color: 0x222222 }));
    leftHand.position.set(-1.2, -0.8, 0);
    const rightHand = leftHand.clone(); rightHand.position.x = 1.2;
    dealer.add(skull, leftHand, rightHand);
    dealer.position.set(0, 5, -3); scene.add(dealer);

    scene.add(new THREE.AmbientLight(0x404040, 2));
    const redLight = new THREE.PointLight(0xff0000, 1.8, 20); redLight.position.set(0, 6, 0); scene.add(redLight);

    // mouse aim mapping
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / innerWidth) * 2 - 1;
      shotgun.rotation.y = x * 0.5;
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      if (dealer) dealer.rotation.y = Math.sin(Date.now() * 0.001) * 0.12;
      renderer.render(scene, camera);
    }
    animate();
  }

  // window resize for three
  window.addEventListener('resize', () => {
    if (camera && renderer) {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }
  });
  </script>
</body>
</html>
