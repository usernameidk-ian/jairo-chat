<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Jairo Spin Game</title>
<style>
    body {
        background: #121212;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 { margin-top: 20px; }

    #spin-btn {
        margin-top: 20px;
        padding: 15px 30px;
        background: #00ff7f;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 20px;
        font-weight: bold;
        transition: 0.2s;
    }
    #spin-btn:hover {
        background: #55ff9e;
    }

    /* spinning overlay */
    #spin-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999;
    }

    .spin-image {
        width: 260px;
        height: 260px;
        object-fit: contain;
        filter: brightness(0%);
        opacity: 0.7;
        animation: spin 0.1s infinite linear;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    #reveal-img {
        max-width: 300px;
        max-height: 300px;
        border-radius: 10px;
        display: none;
        animation: reveal 0.7s ease-out forwards;
    }

    @keyframes reveal {
        from { opacity: 0; transform: scale(0.4); }
        to { opacity: 1; transform: scale(1); }
    }

    /* Inventory */
    #inventory {
        margin-top: 30px;
        width: 90%;
        max-width: 800px;
    }

    .inv-item {
        background: rgba(255,255,255,0.05);
        padding: 10px;
        border-radius: 8px;
        margin: 6px 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .inv-item img {
        width: 60px;
        height: 60px;
        border-radius: 6px;
        object-fit: contain;
    }

    .count-tag {
        background: #00ff7f;
        color: black;
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: bold;
        margin-left: auto;
    }
</style>
</head>
<body>

<h1>🎰 Jairo Spin</h1>
<button id="spin-btn">SPIN</button>

<!-- SPINNING OVERLAY -->
<div id="spin-overlay">
    <img id="spin-img" class="spin-image" src="">
    <img id="reveal-img" src="">
</div>

<!-- INVENTORY -->
<h2>Your Jairo Collection</h2>
<div id="inventory"></div>

<script>
/* ------------------ JAIRO POOL ------------------ */
const jairos = [
    { name: "Sleepy Jairo", file: "sleepy.png", rarity: "Common", chance: 60 },
    { name: "Side-eye Jairo", file: "sideeye.png", rarity: "Common", chance: 60 },
    { name: "Tired Jairo", file: "tired.png", rarity: "Common", chance: 60 },
    { name: "Eating Chips Jairo", file: "chips.png", rarity: "Common", chance: 60 },

    { name: "Angry Jairo", file: "angry.png", rarity: "Uncommon", chance: 25 },
    { name: "Confused Jairo", file: "confused.png", rarity: "Uncommon", chance: 25 },
    { name: "Scared Jairo", file: "scared.png", rarity: "Uncommon", chance: 25 },
    { name: "Shocked Jairo", file: "shocked.png", rarity: "Uncommon", chance: 25 },

    { name: "Sigma Jairo", file: "sigma.png", rarity: "Rare", chance: 10 },
    { name: "Evil Jairo", file: "evil.png", rarity: "Rare", chance: 10 },
    { name: "Sunglasses Jairo", file: "sunglasses.png", rarity: "Rare", chance: 10 },
    { name: "Drip Jairo", file: "drip.png", rarity: "Rare", chance: 10 },

    { name: "Golden Jairo", file: "golden.png", rarity: "Ultra Rare", chance: 4 },
    { name: "Glitched Jairo", file: "glitch.png", rarity: "Ultra Rare", chance: 4 },
    { name: "8-bit Jairo", file: "8bit.png", rarity: "Ultra Rare", chance: 4 },
    { name: "Battle Jairo", file: "battle.png", rarity: "Ultra Rare", chance: 4 },

    { name: "Galaxy Jairo", file: "galaxy.png", rarity: "Legendary", chance: 1 },
    { name: "God Jairo", file: "god.png", rarity: "Legendary", chance: 1 },
    { name: "Santa Jairo", file: "santa.png", rarity: "Legendary", chance: 1 },
    { name: "Shadow Jairo", file: "shadow.png", rarity: 1, chance: 1 },

    { name: "Rainbow Jairo", file: "rainbow.png", rarity: "Mythic", chance: 0.1 },
    { name: "Corrupted Jairo", file: "corrupted.png", rarity: "Mythic", chance: 0.1 },
    { name: "Angel Jairo", file: "angel.png", rarity: "Mythic", chance: 0.1 },
    { name: "Jairo Ascended", file: "ascended.png", rarity: "Mythic", chance: 0.1 },
];

/* ------------ weighted random -------------- */
function rollJairo() {
    let total = 0;
    jairos.forEach(j => total += j.chance);

    let r = Math.random() * total;
    for (let j of jairos) {
        if (r < j.chance) return j;
        r -= j.chance;
    }
}

/* ---------- Inventory stored in localStorage ---------- */
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

function saveInv() {
    localStorage.setItem("inventory", JSON.stringify(inventory));
}

function renderInventory() {
    const inv = document.getElementById("inventory");
    inv.innerHTML = "";

    for (let key in inventory) {
        const item = inventory[key];

        const div = document.createElement("div");
        div.className = "inv-item";

        const img = document.createElement("img");
        img.src = "jairos/" + item.file;

        const name = document.createElement("span");
        name.textContent = item.name + " (" + item.rarity + ")";

        const count = document.createElement("span");
        count.className = "count-tag";
        count.textContent = "x" + item.count;

        div.appendChild(img);
        div.appendChild(name);
        div.appendChild(count);
        inv.appendChild(div);
    }
}

renderInventory();

/* ---------------- SPIN LOGIC ---------------- */
const spinBtn = document.getElementById("spin-btn");
const spinOverlay = document.getElementById("spin-overlay");
const spinImg = document.getElementById("spin-img");
const revealImg = document.getElementById("reveal-img");

spinBtn.addEventListener("click", () => {
    revealImg.style.display = "none";
    spinImg.style.display = "block";

    spinOverlay.style.display = "flex";

    // random silhouette during spinning
    let spinInterval = setInterval(() => {
        const j = jairos[Math.floor(Math.random() * jairos.length)];
        spinImg.src = "jairos/" + j.file;
    }, 100);

    setTimeout(() => {
        clearInterval(spinInterval);

        const result = rollJairo();

        // reveal animation
        spinImg.style.display = "none";
        revealImg.src = "jairos/" + result.file;
        revealImg.style.filter = "none";
        revealImg.style.display = "block";

        // add to inventory
        if (!inventory[result.name]) {
            inventory[result.name] = {
                name: result.name,
                file: result.file,
                rarity: result.rarity,
                count: 1
            };
        } else {
            inventory[result.name].count++;
        }

        saveInv();
        renderInventory();

        // close overlay after reveal
        setTimeout(() => {
            spinOverlay.style.display = "none";
        }, 1500);

    }, 2000); // spin for 2 secs
});
</script>
</body>
</html>
