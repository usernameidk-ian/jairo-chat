<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAIRO ROULETTE</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:monospace; color:#0f0; }
    #lobbyScreen, #waitingScreen, #gameScreen { position:absolute; inset:0; }
    #lobbyScreen { display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; background:#000; }
    #lobbyScreen h1 { font-size:3em; margin-bottom:30px; text-shadow:0 0 20px #0f0; }
    #lobbyScreen input { padding:15px; font-size:1.5em; background:#111; color:#0f0; border:2px solid #0f0; margin:10px; width:80vw; max-width:300px; text-align:center; }
    #lobbyScreen button { padding:15px 30px; font-size:1.5em; background:#300; color:#0f0; border:2px solid #0f0; margin:10px; cursor:pointer; }
    #lobbyList { margin-top:30px; width:90%; max-width:400px; }
    .lobby-item { margin:10px; padding:12px; background:#111; border:1px solid #0f0; text-align:center; font-size:1.2em; }
    #waitingScreen { display:none; flex-direction:column; justify-content:center; align-items:center; background:#000; color:#0f0; font-size:2.5em; }
    #waitingScreen div { font-size:1.5em; animation:dots 1.5s infinite; }
    @keyframes dots { 0%,100%{opacity:0} 50%{opacity:1} }
    #ui { position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,20,0,0.9); padding:20px; border:3px solid #0f0; border-radius:10px; width:340px; }
    button { background:#300; color:#0f0; border:2px solid #0f0; padding:12px 24px; margin:8px; font-size:1.4em; cursor:pointer; }
    button:disabled { opacity:0.4; cursor:not-allowed; }
    #startMatch { background:#0a0 !important; display:none; }
    #deathOverlay, #reviveOverlay { position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity 1s; }
    #deathOverlay { background:#f00; }
    #reviveOverlay { background:#fff; filter:blur(20px); }
    #status { margin-top:15px; font-size:1.8em; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="lobbyScreen">
    <h1>JAIRO ROULETTE</h1>
    <input type="text" id="username" placeholder="Enter your name..." maxlength="15">
    <button id="createLobby">Create Lobby</button>
    <div style="margin:20px">
      <input type="text" id="lobbyIdInput" placeholder="Or enter lobby ID..." maxlength="10">
      <button id="joinSpecific">Join Lobby</button>
    </div>
    <h3>Open Lobbies</h3>
    <div id="lobbyList"></div>
  </div>

  <div id="waitingScreen">
    <div>Waiting for opponent<div>...</div></div>
  </div>

  <div id="gameScreen" style="display:none">
    <div id="ui">
      <div id="players">Loading...</div>
      <div id="lives">Charges: █████ (5 lives)</div>
      <div id="shells">Shells: 0 live / 0 blank</div>
      <button id="selfBtn" disabled>SHOOT SELF</button>
      <button id="dealerBtn" disabled>SHOOT DEALER</button>
      <button id="startMatch">START MATCH</button>
      <div id="status">Waiting for host...</div>
    </div>
    <div id="deathOverlay"></div>
    <div id="reviveOverlay"></div>
  </div>

  <audio id="pump" src="https://freesound.org/data/previews/276/276486_5123854-lq.mp3"></audio>
  <audio id="empty" src="https://freesound.org/data/previews/387/387184_7253504-lq.mp3"></audio>
  <audio id="boom" src="https://freesound.org/data/previews/397/397355_5123854-lq.mp3"></audio>
  <audio id="shock" src="https://freesound.org/data/previews/276/276183_5123854-lq.mp3"></audio>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0tbUqzIN1klxMykCcI9rg1a2EVZqMbtw",
      authDomain: "cookie-clicker-chat.firebaseapp.com",
      databaseURL: "https://cookie-clicker-chat-default-rtdb.firebaseio.com",
      projectId: "cookie-clicker-chat",
      storageBucket: "cookie-clicker-chat.firebasestorage.app",
      messagingSenderId: "758507208645",
      appId: "1:758507208645:web:068b66b4eb6ab4753555ac"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let playerName = "", lobbyId = "", isHost = false;
    let scene, camera, renderer, controls, shotgun, dealer;

    const elements = {
      lobby: document.getElementById("lobbyScreen"),
      waiting: document.getElementById("waitingScreen"),
      game: document.getElementById("gameScreen"),
      players: document.getElementById("players"),
      lives: document.getElementById("lives"),
      shells: document.getElementById("shells"),
      status: document.getElementById("status"),
      startBtn: document.getElementById("startMatch")
    };

    // LOBBY LIST — 100% WORKING
    db.ref("buckshot_lobbies").on("value", snap => {
      const list = document.getElementById("lobbyList");
      list.innerHTML = "";
      const lobbies = snap.val() || {};
      Object.entries(lobbies).forEach(([id, data]) => {
        if (data.full || !data.host) return;
        const count = Object.keys(data.players || {}).length;
        if (count >= 2) return;
        const div = document.createElement("div");
        div.className = "lobby-item";
        div.innerHTML = data.host + "'s lobby (" + count + "/2) <button onclick=\"joinLobby('" + id + "')\">Join</button>";
        list.appendChild(div);
      });
    });

    window.joinLobby = id => {
      document.getElementById("lobbyIdInput").value = id;
      document.getElementById("joinSpecific").click();
    };

    document.getElementById("createLobby").onclick = () => start(true);
    document.getElementById("joinSpecific").onclick = () => {
      lobbyId = document.getElementById("lobbyIdInput").value.trim().toUpperCase();
      if (!lobbyId) return alert("Enter lobby ID");
      start(false);
    };

    function start(host) {
      playerName = document.getElementById("username").value.trim() || "Player" + Math.floor(Math.random()*9999);
      isHost = host;
      if (host) lobbyId = "L" + Date.now().toString(36).toUpperCase();

      elements.lobby.style.display = "none";
      elements.waiting.style.display = "flex";

      const lobbyRef = db.ref("buckshot_lobbies/" + lobbyId);
      lobbyRef.child("players/" + playerName).set({ lives: 5, charges: 5 });
      if (host) lobbyRef.set({ host: playerName, full: false, gameStarted: false });

      listen(lobbyRef);
    }

    function listen(ref) {
      ref.on("value", snap => {
        const data = snap.val();
        if (!data || !data.players) return;

        const players = Object.keys(data.players);
        elements.players.textContent = players.join(" vs ");

        if (players.length === 2 && !data.gameStarted) {
          ref.update({ full: true, gameStarted: true });
          elements.waiting.style.display = "none";
          elements.game.style.display = "block";
          init3D();
          if (isHost) elements.startBtn.style.display = "block";
        }

        const me = data.players[playerName];
        if (me) elements.lives.textContent = "Charges: " + "█".repeat(me.charges) + " (" + me.lives + " lives)";

        elements.shells.textContent = "Shells: " + (data.live || 0) + " live / " + (data.blank || 0) + " blank";

        const myTurn = data.turn === playerName;
        document.getElementById("selfBtn").disabled = !myTurn;
        document.getElementById("dealerBtn").disabled = !myTurn;
        elements.status.textContent = myTurn ? "YOUR TURN" : "OPPONENT'S TURN";
      });
    }

    elements.startBtn.onclick = () => {
      elements.startBtn.style.display = "none";
      const live = Math.floor(Math.random() * 4) + 2;
      const blank = 8 - live;
      db.ref("buckshot_lobbies/" + lobbyId + "/players").once("value", s => {
        const players = Object.keys(s.val());
        const first = players[Math.floor(Math.random() * 2)];
        db.ref("buckshot_lobbies/" + lobbyId).update({ live, blank, turn: first });
      });
    };

    function shoot(self) {
      if (document.getElementById("selfBtn").disabled) return;
      document.getElementById("pump").play();
      shotgun.scale.set(1.15,1.15,1.15);
      setTimeout(() => shotgun.scale.set(1,1,1), 200);

      db.ref("buckshot_lobbies/" + lobbyId).once("value").then(snap => {
        const data = snap.val();
        const isLive = Math.random() < (data.live / (data.live + data.blank));
        const target = self ? playerName : Object.keys(data.players).find(p => p !== playerName);

        if (isLive) {
          document.getElementById("boom").play();
          document.getElementById("deathOverlay").style.opacity = 1;
          setTimeout(() => {
            document.getElementById("deathOverlay").style.opacity = 0;
            elements.status.textContent = "BANG!";
            db.ref("buckshot_lobbies/" + lobbyId + "/players/" + target + "/lives").transaction(v => v - 1);
          }, 1000);
        } else {
          document.getElementById("empty").play();
        }

        const updates = { live: data.live - (isLive ? 1 : 0), blank: data.blank - (isLive ? 0 : 1) };
        if (updates.live + updates.blank === 0) {
          setTimeout(() => elements.startBtn.onclick(), 1500);
        } else {
          updates.turn = Object.keys(data.players).find(p => p !== playerName);
        }
        db.ref("buckshot_lobbies/" + lobbyId).update(updates);
      });
    }

    document.getElementById("selfBtn").onclick = () => shoot(true);
    document.getElementById("dealerBtn").onclick = () => shoot(false);

    function init3D() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
      camera.position.set(0, 4, 10);
      renderer = new THREE.WebGLRenderer({antialias:true});
      renderer.setSize(innerWidth, innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      const table = new THREE.Mesh(new THREE.BoxGeometry(12,0.5,10), new THREE.MeshStandardMaterial({color:0x002200}));
      table.position.y = -0.25; scene.add(table);

      shotgun = new THREE.Group();
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,4,16), new THREE.MeshStandardMaterial({color:0x888888}));
      barrel.rotation.z = Math.PI/2; barrel.position.x = 2;
      const stock = new THREE.Mesh(new THREE.BoxGeometry(2.5,0.5,0.8), new THREE.MeshStandardMaterial({color:0x8B4513}));
      stock.position.x = -0.8;
      shotgun.add(barrel, stock);
      shotgun.position.y = 0.4; scene.add(shotgun);

      dealer = new THREE.Group();
      const skull = new THREE.Mesh(new THREE.SphereGeometry(0.9,16,16), new THREE.MeshStandardMaterial({color:0x111111}));
      const hand = new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3), new THREE.MeshStandardMaterial({color:0x222222}));
      const left = hand.clone(); left.position.set(-1.2,-0.8,0);
      const right = hand.clone(); right.position.set(1.2,-0.8,0);
      dealer.add(skull, left, right);
      dealer.position.set(0,5,-3); scene.add(dealer);

      scene.add(new THREE.AmbientLight(0x400000, 2));
      const red = new THREE.PointLight(0xff0000, 3, 20); red.position.set(0,6,0); scene.add(red);

      document.addEventListener("mousemove", e => {
        const x = (e.clientX / innerWidth) * 2 - 1;
        shotgun.rotation.y = x * 0.5;
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        dealer.rotation.y = Math.sin(Date.now()*0.001)*0.15;
        renderer.render(scene, camera);
      }
      animate();
    }

    window.onresize = () => {
      if (camera) {
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      }
    };
  </script>
</body>
</html>
