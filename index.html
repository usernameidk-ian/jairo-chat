<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>jairo — chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>yapping (chat)</h1>
    <div class="controls">
      <button id="open-game" title="Open the game in a new tab">Play Game</button>
    </div>
  </header>

  <div class="container">
    <main class="chat-box">
      <div class="chat-header">
        <h2>Chat</h2>
        <button id="clear-chat" style="display:none;">🗑 Clear</button>
      </div>

      <div id="chat-messages" class="chat-messages"></div>

      <div class="chat-input-row">
        <div id="gif-menu" class="gif-popup">
          <p style="margin: 0 0 8px 0; color: #00ff00; font-size: 14px; font-weight: bold;">Search GIFs</p>
          <input type="text" id="gif-search-input" placeholder="Search Tenor..." autocomplete="off"/>
          <div id="gif-results"></div>
        </div>

        <button id="gif-toggle" title="Search GIFs">
          <img src="gificon.png" alt="GIF" style="width:20px; height:20px; display:block;">
        </button>
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off"/>
        <button id="send-chat">Send</button>
      </div>

      <p id="timeout-timer" class="timeout-timer"></p>
    </main>
  </div>

  <audio id="bgm" loop>
    <source src="nothingyet.mp3" type="audio/mpeg" />
    Your browser does not support audio.
  </audio>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

      apiKey: "AIzaSyA0tbUqzIN1klxMykCcI9rg1a2EVZqMbtw",
      authDomain: "cookie-clicker-chat.firebaseapp.com",
      databaseURL: "https://cookie-clicker-chat-default-rtdb.firebaseio.com",
      projectId: "cookie-clicker-chat",

    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <script src="script.js"></script>
</body>
</html>
