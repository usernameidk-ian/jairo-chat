<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>jairo — chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>yapping (chat) - QOL Update</h1>
    <div class="controls">
      <button id="open-game" title="Open the game in a new tab">Play Game</button>
    </div>
  </header>

  <div class="container">
    
    <div id="admin-soundboard" class="soundboard" style="display:none;">
      <div class="sb-header">
        <h3>Admin SFX</h3>
        <button id="close-sfx">✕</button>
      </div>
      <button onclick="triggerSound('s1')">huh?</button>
      <button onclick="triggerSound('s2')">ayogama hahaha(laughing)</button>
      <button onclick="triggerSound('s3')">metal bar drop</button>
      <button onclick="triggerSound('s4')">helo hru im under the water</button>
      <button onclick="triggerSound('s5')">ishowspeed bark</button>
      <button onclick="triggerSound('s6')">kinda low pitch screaming</button>
      <button onclick="triggerSound('s7')">alarm 🚨</button>
      <button onclick="triggerSound('s8')">whistle notification</button>
      <button onclick="triggerSound('s9')">glass breaking</button>
      <button onclick="triggerSound('s10')">one second train horn</button>
    </div>

    <button id="admin-toggle" style="display:none;">🍏</button>

    <main class="chat-box">
      <div id="school-clock" class="school-clock" style="display:none;">
        <div id="currently-line">it is currently <span id="current-name"></span></div>
        <div id="until-line">time until <span id="next-name"></span>:</div>
        <div id="timer-display">00:00</div>
      </div>

      <div class="chat-header">
        <h2>Chat</h2>
        <button id="clear-chat" style="display:none;">🗑 Clear</button>
      </div>

      <div id="chat-messages" class="chat-messages"></div>

      <div id="typing-indicator" class="typing-indicator"></div>

      <div id="gif-vault" class="media-popup">
        <div class="media-grid" id="gif-list"></div>
      </div>
      <div id="emoji-vault" class="media-popup">
        <div class="media-grid" id="emoji-list"></div>
      </div>

      <div class="chat-input-row">
        <button id="gif-btn" class="icon-btn"><img src="gificon.png" alt="GIF"></button>
        <button id="emoji-btn" class="icon-btn">🧐</button>
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off"/>
        <div id="char-counter">2000</div>
        <button id="send-chat">Send</button>
      </div>

      <p id="timeout-timer" class="timeout-timer"></p>
    </main>
  </div>

  <audio id="bgm" loop>
    <source src="nothingyet.mp3" type="audio/mpeg" />
    Your browser does not support audio.
  </audio>

  <audio id="sfx-player"></audio>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0tbUqzIN1klxMykCcI9rg1a2EVZqMbtw",
      authDomain: "cookie-clicker-chat.firebaseapp.com",
      databaseURL: "https://cookie-clicker-chat-default-rtdb.firebaseio.com",
      projectId: "cookie-clicker-chat",
      storageBucket: "cookie-clicker-chat.firebasestorage.app",
      messagingSenderId: "758507208645",
      appId: "1:758507208645:web:068b66b4eb6ab4753555ac"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <script src="script.js"></script>
</body>
</html>
