<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>jairo — chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>yapping (chat)</h1>
    <div class="controls">
      <button id="open-game" title="Open the game in a new tab">Play Game</button>
    </div>
  </header>

  <div class="container">

    <!-- Right: Chat -->
    <main class="chat-box">
      <div class="chat-header">
        <h2>Chat</h2>
        <button id="clear-chat" style="display:none;">🗑 Clear</button>
      </div>

      <div id="chat-messages" class="chat-messages"></div>

      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off"/>
        <button id="send-chat">Send</button>
      </div>

      <p id="timeout-timer" class="timeout-timer"></p>
    </main>
  </div>

  <!-- Background Music -->
  <audio id="bgm" loop>
    <source src="nothingyet.mp3" type="audio/mpeg" />
    Your browser does not support audio.
  </audio>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

  <script src="script.js"></script>
</body>
</html>
